baseURL = "http://150.158.53.42/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Min Yang 的报告博客"
theme = "hugo-book"
enableRobotsTXT = true
buildDrafts = false
pygmentsUseClasses = true
enableInlineShortcodes = true

# Book theme content section — articles live under content/posts/.
[params]
  # Book section to display in the sidebar.
  BookSection = "posts"
  # Show table of contents on the right side.
  BookToC = true
  # Repo link for "Edit this page" button.
  BookRepo = "https://github.com/cassiewilliam/blog"
  BookEditPath = "edit/main/content"
  # Date format on archive / list pages.
  BookDateFormat = "2006-01-02"
  # Comments / search.
  BookComments = true
  BookSearch = true
  # Add a custom logo.
  BookLogo = "/avatar.jpg"
  # Optional menu entries beyond the section.
  BookMenuBundle = "/menu"
  # Site-wide author + description.
  description = "GPU / CUDA / LLM 系统优化 · 长上下文推理 · MoE 内核工程"
  author = "Min Yang"
  # Per-post math/drawio still gated on frontmatter (preserves edit-fig flow).
  math = false
  drawio = false
  # 不蒜子 PV/UV counter site-wide.
  busuanzi = true

# drawio GitHub direct-edit (used by {{< fig >}} shortcode + /edit-fig/)
[params.drawioRepo]
  drawioGithubRepo = "cassiewilliam/blog"
  drawioGithubBranch = "main"

# Giscus 评论配置 — extend_head.html partial reads these.
[params.giscus]
  repo = "cassiewilliam/blog"
  repoID = "R_kgDOSOl71A"
  category = "Announcements"
  categoryID = "DIC_kwDOSOl71M4C73A_"
  mapping = "pathname"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "bottom"
  theme = "preferred_color_scheme"
  lang = "zh-CN"
  loading = "lazy"

# Top menu (icons + external links)
[[menu.after]]
  name = "GitHub"
  url = "https://github.com/cassiewilliam"
  weight = 10
[[menu.after]]
  name = "RSS"
  url = "/index.xml"
  weight = 20
[[menu.after]]
  name = "About"
  url = "/about/"
  weight = 30
[[menu.after]]
  name = "Admin"
  url = "/admin/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[taxonomies]
  tag = "tags"
