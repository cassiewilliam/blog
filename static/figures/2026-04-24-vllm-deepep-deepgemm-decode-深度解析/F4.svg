<svg viewBox="0 0 1000 345" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="#333">DeepEP LL 与 HT 在 kernel 层的差异</text>

<g font-family="sans-serif" font-size="11.5">
  <rect x="60"  y="60" width="420" height="270" rx="6" fill="#fff5f0" stroke="#b85450"/>
  <text x="270" y="82" text-anchor="middle" font-weight="700" fill="#4a1515">HT (High Throughput)</text>
  <text x="80" y="108" fill="#4a1515">• kernel 内启动 SM 参与数据收发</text>
  <text x="80" y="130" fill="#4a1515">• NVLink / RDMA layout 动态计算</text>
  <text x="80" y="152" fill="#4a1515">• dispatch 阶段先分桶再写</text>
  <text x="80" y="174" fill="#4a1515">• combine 用 BF16（2× dispatch 流量）</text>
  <text x="80" y="196" fill="#4a1515">• 支持 async prepare / finalize hook</text>
  <text x="80" y="218" fill="#4a1515">• 依赖 token 数 → 不能 CUDA Graph</text>
  <text x="80" y="246" fill="#4a1515" font-weight="700">适用：Prefill 大 batch 吞吐优先</text>
  <text x="80" y="268" fill="#4a1515">单层延迟 ~20 ms</text>

  <rect x="520" y="60" width="420" height="270" rx="6" fill="#eef7ee" stroke="#5fa55f"/>
  <text x="730" y="82" text-anchor="middle" font-weight="700" fill="#1a3d1a">LL (Low Latency)</text>
  <text x="540" y="108" fill="#1a3d1a">• kernel 使用 cooperative launch</text>
  <text x="540" y="130" fill="#1a3d1a">• num_sms=0，通信完全靠 RDMA HW</text>
  <text x="540" y="152" fill="#1a3d1a">• 64 QPs/rank 最大化 IB 并发</text>
  <text x="540" y="174" fill="#1a3d1a">• combine 内部做 weighted-sum</text>
  <text x="540" y="196" fill="#1a3d1a">• dispatch 固定 max_tokens 形状</text>
  <text x="540" y="218" fill="#1a3d1a">• 可录入 CUDA Graph，复用 pointer</text>
  <text x="540" y="246" fill="#1a3d1a" font-weight="700">适用：Decode 单 token 延迟优先</text>
  <text x="540" y="268" fill="#1a3d1a">单层延迟 ~1-2 ms</text>
</g>
</svg>