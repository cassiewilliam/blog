<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4d5562"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}
      .title{font-size:28px;font-weight:700}
      .subtitle{font-size:13px;fill:#667085}
      .lane{font-size:14px;font-weight:700;fill:#667085}
      .head{font-size:15px;font-weight:700}
      .small{font-size:12.5px;fill:#344054}
      .formula{font-family:Georgia,"Times New Roman",serif;font-size:21px;font-style:italic}
      .formulaSm{font-family:Georgia,"Times New Roman",serif;font-size:17px;font-style:italic}
      .sub{font-size:12px;baseline-shift:sub}
      .box{stroke-width:2}
      .thin{stroke-width:1.4}
      .edge{stroke:#4d5562;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#667085;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .cache{fill:#fff5f0;stroke:#b85450;stroke-width:1.6}
      .io{fill:#fff;stroke:#d0d7de;stroke-width:1.4}
    </style>
  </defs>

  <rect width="1180" height="560" fill="#fff"/>
  <text x="40" y="48" class="title">SonicMoE optimization map: where each cost disappears</text>
  <text x="40" y="76" class="subtitle">Read left to right as the path from routing metadata to HBM output.</text>
  <rect x="55" y="125" width="175" height="82" rx="9" fill="#eef7ff" stroke="#4a6fd3" class="box"/>
  <text x="142.5" y="153" text-anchor="middle" class="head">Router</text>
  <text x="142.5" y="181" text-anchor="middle" class="formula">TopK<tspan class="sub">K</tspan>(S<tspan class="sub">t</tspan>)</text>
  <rect x="67" y="270" width="151" height="76" rx="8" fill="#fff" stroke="#d0d7de" class="thin"/>
  <text x="142.5" y="298" text-anchor="middle" class="formula">t<tspan class="sub">router</tspan></text>
  <text x="142.5" y="326" text-anchor="middle" class="small">↓</text>
  <path d="M142.5 207 L142.5 270" class="edge"/>
  <rect x="275" y="125" width="175" height="82" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="362.5" y="153" text-anchor="middle" class="head">Load</text>
  <text x="362.5" y="181" text-anchor="middle" class="formula">X<tspan class="sub">e</tspan>=G(X,π[:,e])</text>
  <rect x="287" y="270" width="151" height="76" rx="8" fill="#fff" stroke="#d0d7de" class="thin"/>
  <text x="362.5" y="298" text-anchor="middle" class="formula">¬X<tspan class="sub">e</tspan>∈ℝ<tspan class="sub">TK×d</tspan></text>
  <text x="362.5" y="326" text-anchor="middle" class="small">no materialize</text>
  <path d="M362.5 207 L362.5 270" class="edge"/>
  <path d="M230 166 L275 166" class="edge"/>
  <rect x="495" y="125" width="175" height="82" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="582.5" y="153" text-anchor="middle" class="head">GEMM</text>
  <text x="582.5" y="181" text-anchor="middle" class="formula">T<tspan class="sub">e</tspan> mod M<tspan class="sub">tile</tspan></text>
  <rect x="507" y="270" width="151" height="76" rx="8" fill="#fff" stroke="#d0d7de" class="thin"/>
  <text x="582.5" y="298" text-anchor="middle" class="formula">R<tspan class="sub">e</tspan>=T<tspan class="sub">e</tspan> mod M<tspan class="sub">tile</tspan></text>
  <text x="582.5" y="326" text-anchor="middle" class="small">TR reduces tail</text>
  <path d="M582.5 207 L582.5 270" class="edge"/>
  <path d="M450 166 L495 166" class="edge"/>
  <rect x="715" y="125" width="175" height="82" rx="9" fill="#f7eff8" stroke="#a33ea1" class="box"/>
  <text x="802.5" y="153" text-anchor="middle" class="head">Epilogue</text>
  <text x="802.5" y="181" text-anchor="middle" class="formula">dS=⟨dA′,A⟩</text>
  <rect x="727" y="270" width="151" height="76" rx="8" fill="#fff" stroke="#d0d7de" class="thin"/>
  <text x="802.5" y="298" text-anchor="middle" class="formula">MMA ∥ IO<tspan class="sub">epi</tspan></text>
  <text x="802.5" y="326" text-anchor="middle" class="small">hide stalls</text>
  <path d="M802.5 207 L802.5 270" class="edge"/>
  <path d="M670 166 L715 166" class="edge"/>
  <rect x="935" y="125" width="175" height="82" rx="9" fill="#fff5f0" stroke="#b85450" class="box"/>
  <text x="1022.5" y="153" text-anchor="middle" class="head">Output</text>
  <text x="1022.5" y="181" text-anchor="middle" class="formula">O<tspan class="sub">t</tspan>=Σ<tspan class="sub">e</tspan>πSY</text>
  <rect x="947" y="270" width="151" height="76" rx="8" fill="#fff" stroke="#d0d7de" class="thin"/>
  <text x="1022.5" y="298" text-anchor="middle" class="formula">Y<tspan class="sub">expert</tspan> → O</text>
  <text x="1022.5" y="326" text-anchor="middle" class="small">no scatter</text>
  <path d="M1022.5 207 L1022.5 270" class="edge"/>
  <path d="M890 166 L935 166" class="edge"/>
  <rect x="140" y="420" width="900" height="54" rx="8" fill="#f7f8fa" stroke="#d0d7de" class="thin"/>
  <text x="590" y="453" text-anchor="middle" class="small">The contribution is the product of small decisions across the whole MoE path, not a single faster GEMM.</text>
</svg>
