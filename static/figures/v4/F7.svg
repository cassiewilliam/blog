<text fill="#5fa55f" font-family="monospace" font-size="11" x="620" y="220">theoretical 1.92×  ·  measured 1.50 – 1.96×</text>
<rect fill="#fafbfc" height="58" rx="4" stroke="#d0d7de" width="920" x="40" y="270"></rect>
<text fill="#333" font-family="sans-serif" font-size="11" x="50" y="288">• key insight: comm &lt; compute, so fuse the 5 stages and hide comm inside compute to saturate SMs</text>
<text fill="#333" font-family="sans-serif" font-size="11" x="50" y="305">• threshold: C/B ≤ 2d = 6144 FLOPs/Byte → 1 GBps interconnect hides 6.1 TFLOP/s (V4-Pro config)</text>
<text fill="#333" font-family="sans-serif" font-size="11" x="50" y="322">• pull-based cross-GPU reads avoid the per-message notification cost of push</text>
</svg>