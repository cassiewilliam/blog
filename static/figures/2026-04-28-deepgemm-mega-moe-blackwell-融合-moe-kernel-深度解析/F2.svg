  </style>
</defs>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">SM100 hierarchy used by Mega MoE</text>
<text x="500" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#57606a">The kernel is tuned at every Blackwell execution level</text>
<rect x="55" y="112" width="154" height="96" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="132" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#24292f">Grid</text>
<text x="132" y="172" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">persistent</text>
<text x="132" y="189" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">all SMs</text>
<line x1="215" y1="160" x2="237" y2="160" stroke="#4a6fd3" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="243" y="112" width="154" height="96" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="320" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#24292f">Cluster</text>
