<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .green { fill: #dff8ec; stroke: #20a66b; }
      .blue { fill: #e5f0ff; stroke: #3b82f6; }
      .amber { fill: #fff3d8; stroke: #f59e0b; }
      .rose { fill: #ffe4e6; stroke: #fb7185; }
      .purple { fill: #f0e7ff; stroke: #8b5cf6; }
      .ink { stroke: #334155; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="920" height="430"/>
  <text class="title" x="36" y="44">一次 NVFP4 GEMM 的计算流：量化、打包、block-scaled MMA、输出</text>
  <rect class="panel" x="48" y="95" width="150" height="100" rx="8"/>
  <text class="label" x="66" y="125">高精度张量</text>
  <text class="small" x="66" y="151">BF16/FP16/FP32</text>
  <text class="small" x="66" y="171">weight 或 activation</text>
  <rect class="panel amber" x="238" y="95" width="160" height="100" rx="8"/>
  <text class="label" x="256" y="125">统计 amax</text>
  <text class="small" x="256" y="151">tensor amax</text>
  <text class="small" x="256" y="171">block amax</text>
  <rect class="panel blue" x="438" y="95" width="165" height="100" rx="8"/>
  <text class="label" x="456" y="125">生成 scale</text>
  <text class="small" x="456" y="151">FP32 global</text>
  <text class="small" x="456" y="171">E4M3 block</text>
  <rect class="panel green" x="642" y="95" width="160" height="100" rx="8"/>
  <text class="label" x="660" y="125">pack FP4</text>
  <text class="small" x="660" y="151">E2M1 payload</text>
  <text class="small" x="660" y="171">2 values / byte</text>
  <rect class="panel purple" x="340" y="250" width="230" height="105" rx="8"/>
  <text class="label" x="358" y="280">Blackwell Tensor Core</text>
  <text class="small" x="358" y="306">读取 A/B FP4 + scale</text>
  <text class="small" x="358" y="326">按 K 维 block descale</text>
  <text class="small" x="358" y="346">accumulate 到高精度</text>
  <rect class="panel rose" x="626" y="250" width="205" height="105" rx="8"/>
  <text class="label" x="644" y="280">Epilogue / 输出</text>
  <text class="small" x="644" y="306">global scale 合并</text>
  <text class="small" x="644" y="326">BF16/FP16/FP32 或 FP4 output</text>
  <path class="ink" d="M 198 145 L 238 145"/>
  <path class="ink" d="M 398 145 L 438 145"/>
  <path class="ink" d="M 603 145 L 642 145"/>
  <path class="soft" d="M 722 195 L 492 250"/>
  <path class="ink" d="M 570 303 L 626 303"/>
  <text class="small" x="71" y="390">工程注意：global amax 可能引入额外 pass；activation scale 常在运行时算，weight scale 可离线搜索或混合精度分配。</text>
</svg>
