<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="430" fill="#ffffff"/>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">Multi-head attention: concat forward, split backward</text>
<text x="500" y="64" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">each head owns parameters, all heads contribute to the same input adjoint</text>
<rect x="50" y="105" width="140" height="70" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="120" y="134" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#24292f">head 1</text>
<text x="120" y="156" text-anchor="middle" font-family="monospace" font-size="13" font-weight="500" fill="#57606a">Yh</text>
<line x1="120" y1="176" x2="120" y2="235" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="240" y="105" width="140" height="70" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="310" y="134" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#24292f">head 2</text>
<text x="310" y="156" text-anchor="middle" font-family="monospace" font-size="13" font-weight="500" fill="#57606a">Yh</text>
<line x1="310" y1="176" x2="310" y2="235" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="430" y="105" width="140" height="70" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="500" y="134" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#24292f">head 3</text>
<text x="500" y="156" text-anchor="middle" font-family="monospace" font-size="13" font-weight="500" fill="#57606a">Yh</text>
<line x1="500" y1="176" x2="500" y2="235" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="620" y="105" width="140" height="70" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="690" y="134" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#24292f">head 4</text>
<text x="690" y="156" text-anchor="middle" font-family="monospace" font-size="13" font-weight="500" fill="#57606a">Yh</text>
<line x1="690" y1="176" x2="690" y2="235" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="180" y="235" width="640" height="70" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="500" y="264" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#24292f">Concat[Y1 ... YH] → Wo</text>
<text x="500" y="286" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" fill="#57606a">forward concatenates columns; backward slices Δconcat</text>
<line x1="500" y1="307" x2="500" y2="360" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="300" y="360" width="400" height="44" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="500" y="388" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#24292f">ΔX = Σh ΔXh</text>
</svg>
