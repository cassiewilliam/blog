<rect fill="#e1d5e7" height="40" stroke="#9673a6" stroke-width="2" width="40" x="40" y="430"></rect>
<text fill="#5a3475" font-size="13" font-style="italic" font-weight="700" text-anchor="middle" x="60" y="455">dX</text>
