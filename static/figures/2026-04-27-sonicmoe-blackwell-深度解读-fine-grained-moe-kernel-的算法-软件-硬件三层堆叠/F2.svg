<rect fill="#fff8d5" height="125" rx="6" stroke="#e0b300" stroke-width="1.5" width="270" x="565" y="100"></rect>
<text fill="#7a4e00" font-size="12" font-weight="700" text-anchor="middle" x="700" y="120">Down-proj</text>
