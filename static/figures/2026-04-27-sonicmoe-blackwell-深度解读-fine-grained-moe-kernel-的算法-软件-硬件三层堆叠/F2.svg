<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 500">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4d5562"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}
      .title{font-size:28px;font-weight:700}
      .subtitle{font-size:13px;fill:#667085}
      .lane{font-size:14px;font-weight:700;fill:#667085}
      .head{font-size:15px;font-weight:700}
      .small{font-size:12.5px;fill:#344054}
      .formula{font-family:Georgia,"Times New Roman",serif;font-size:21px;font-style:italic}
      .sub{font-size:12px;baseline-shift:sub}
      .box{stroke-width:2}
      .thin{stroke-width:1.4}
      .edge{stroke:#4d5562;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#667085;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .cache{fill:#fff5f0;stroke:#b85450;stroke-width:1.6}
      .io{fill:#fff;stroke:#d0d7de;stroke-width:1.4}
    </style>
  </defs>

  <rect width="1160" height="500" fill="#fff"/>
  <text x="40" y="48" class="title">SonicMoE: keep tensors close to the GEMM pipeline</text>
  <text x="40" y="76" class="subtitle">The workflow keeps the same MoE semantics but moves gather, activation, and reductions into the kernels that already touch the data.</text>
  <text x="55" y="125" class="lane">Forward: 3 kernels</text>
  <rect x="120" y="145" width="170" height="86" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="205.0" y="176" text-anchor="middle" class="head">Up-proj</text>
  <text x="205.0" y="203" text-anchor="middle" class="small">gather + act</text>
  <rect x="380" y="145" width="170" height="86" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="465.0" y="176" text-anchor="middle" class="head">Down-proj</text>
  <text x="465.0" y="203" text-anchor="middle" class="small">expert-packed Y</text>
  <path d="M290 188 L380 188" class="edge"/>
  <rect x="645" y="145" width="170" height="86" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="730.0" y="176" text-anchor="middle" class="head">Aggregation</text>
  <text x="730.0" y="203" text-anchor="middle" class="small">gather-and-sum</text>
  <path d="M550 188 L645 188" class="edge"/>
  <rect x="900" y="145" width="170" height="86" rx="9" fill="#eef7ff" stroke="#4a6fd3" class="box"/>
  <text x="985.0" y="176" text-anchor="middle" class="head">Output</text>
  <text x="985.0" y="203" text-anchor="middle" class="small">O</text>
  <path d="M815 188 L900 188" class="edge"/>
  <text x="55" y="305" class="lane">Backward: 5 kernels, but no Y / dY cache path</text>
  <rect x="120" y="330" width="185" height="88" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="212.5" y="361" text-anchor="middle" class="head">dX aggregation</text>
  <text x="212.5" y="388" text-anchor="middle" class="small">sum expert grads</text>
  <rect x="380" y="330" width="185" height="88" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="472.5" y="361" text-anchor="middle" class="head">Up act grad</text>
  <text x="472.5" y="388" text-anchor="middle" class="small">dX + dW1</text>
  <rect x="645" y="318" width="220" height="112" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="755.0" y="349" text-anchor="middle" class="head">Fused dH kernel</text>
  <text x="755.0" y="376" text-anchor="middle" class="small">dH + dS + A_S</text>
  <rect x="930" y="330" width="170" height="88" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="1015.0" y="361" text-anchor="middle" class="head">Weight grad</text>
  <text x="1015.0" y="388" text-anchor="middle" class="small">dW1 / dW2</text>
  <path d="M305 374 L380 374" class="edge"/>
  <path d="M565 374 L645 374" class="edge"/>
  <path d="M865 374 L930 374" class="edge"/>
  <rect x="420" y="245" width="320" height="40" rx="8" fill="#fff5f0" stroke="#b85450" class="thin"/>
  <text x="580" y="270" text-anchor="middle" class="small">Only X, H, and routing metadata are cached for backward</text>
</svg>
