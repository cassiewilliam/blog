<svg font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif" viewbox="0 0 1200 660" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="ste_ar" markerheight="6" markerwidth="6" orient="auto" refx="9" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#4b5563"></path></marker></defs>
<rect fill="#fff" height="660" width="1200"></rect>
<text fill="#111827" font-size="16" font-weight="700" text-anchor="middle" x="600" y="26">дёәд»Җд№ҲйңҖиҰҒ STEпјҢдёәд»Җд№Ҳ NVFP4 еҸҲдёҚйңҖиҰҒ В· ж•°еӯҰеҜ№жҜ”</text>
<text fill="#6b7280" font-size="11" text-anchor="middle" x="600" y="46">ж ёеҝғпјҡround() еҜјж•°дёә 0 вҶ’ жўҜеәҰж¶ҲеӨұ вҶ’ з”Ё STE еҒҮиЈ…жҳҜжҒ’зӯү В· NVFP4 з”ЁйҡҸжңә rounding и®© round жңҹжңӣе°ұжҳҜжҒ’зӯү</text>
<!-- LEFT: Deterministic + STE -->
<g transform="translate(40,72)">
<rect fill="#fff5f0" height="560" rx="10" stroke="#b85450" stroke-width="1.4" width="540" x="0" y="0"></rect>
<text fill="#7a2f2b" font-size="14" font-weight="700" text-anchor="middle" x="270" y="26">зЎ®е®ҡжҖ§ round + STE</text>
<text fill="#7a2f2b" font-size="10.5" font-style="italic" text-anchor="middle" x="270" y="46">V4 MXFP4 / LMSYS INT4 / з»Ҹе…ё QAT</text>
<!-- Forward path -->
<text fill="#7a2f2b" font-size="12" font-weight="700" x="20" y="76">[еүҚеҗ‘] round-to-nearest</text>
<rect fill="#fff" height="40" rx="6" stroke="#333" width="460" x="40" y="92"></rect>
<text fill="#111" font-size="14" text-anchor="middle" x="270" y="116">Q(x) = round(x В· scale) / scale</text>
<text fill="#7a2f2b" font-size="11" text-anchor="middle" x="270" y="148">жҜҸжӯҘеӣәе®ҡең°жҠҠ x жҠ•еҲ°жңҖиҝ‘зҡ„еҸҜиЎЁзӨәзӮ№</text>
<!-- Step plot -->
<g transform="translate(60,176)">
<rect fill="#fff" height="120" stroke="#9ca3af" width="200" x="0" y="0"></rect>
<line stroke="#333" x1="20" x2="180" y1="100" y2="100"></line>
<line stroke="#333" x1="20" x2="20" y1="20" y2="100"></line>
<text fill="#555" font-size="9" text-anchor="middle" x="20" y="115">x</text>
<text fill="#555" font-size="9" text-anchor="end" x="14" y="22">Q(x)</text>
<!-- step function -->
<path d="M 20,100 L 50,100 L 50,80 L 80,80 L 80,60 L 110,60 L 110,40 L 140,40 L 140,20 L 180,20" fill="none" stroke="#b85450" stroke-width="2"></path>
<text fill="#7a2f2b" font-size="10" text-anchor="middle" x="100" y="135">йҳ¶жўҜеҮҪж•° В· е№іеҸ°еҜјж•° = 0</text>
</g>
<!-- Derivative plot -->
<g transform="translate(280,176)">
<rect fill="#fff" height="120" stroke="#9ca3af" width="200" x="0" y="0"></rect>
<line stroke="#333" x1="20" x2="180" y1="100" y2="100"></line>
<line stroke="#333" x1="20" x2="20" y1="20" y2="100"></line>
<text fill="#555" font-size="9" text-anchor="middle" x="20" y="115">x</text>
<text fill="#555" font-size="9" text-anchor="end" x="14" y="22">dQ/dx</text>
<line stroke="#b85450" stroke-width="2" x1="20" x2="180" y1="100" y2="100"></line>
<line stroke="#b85450" stroke-width="1.5" x1="50" x2="50" y1="100" y2="20"></line>
<line stroke="#b85450" stroke-width="1.5" x1="80" x2="80" y1="100" y2="20"></line>
<line stroke="#b85450" stroke-width="1.5" x1="110" x2="110" y1="100" y2="20"></line>
<line stroke="#b85450" stroke-width="1.5" x1="140" x2="140" y1="100" y2="20"></line>
<text fill="#7a2f2b" font-size="10" text-anchor="middle" x="100" y="135">еҮ д№ҺеӨ„еӨ„ = 0 В· иҫ№з•Ңдёә Оҙ</text>
</g>
<!-- Backward problem -->
<text fill="#7a2f2b" font-size="12" font-weight="700" x="20" y="324">[еҸҚеҗ‘] жўҜеәҰж¶ҲеӨұпјҒ</text>
<rect fill="#fff" height="60" rx="6" stroke="#333" width="460" x="40" y="338"></rect>
<text fill="#7a2f2b" font-size="11.5" text-anchor="middle" x="270" y="360">вҲӮL/вҲӮW_master = вҲӮL/вҲӮW_q В· вҲӮW_q/вҲӮW_master</text>
<text fill="#b85450" font-size="11.5" font-weight="700" text-anchor="middle" x="270" y="380">вҲӮW_q/вҲӮW_master вүҲ 0 (a.e.) вҶ’ жўҜеәҰиў«йӣ¶д№ҳжҺү</text>
<!-- STE patch -->
<text fill="#7a2f2b" font-size="12" font-weight="700" x="20" y="424">[STE иЎҘдёҒ] еҒҮиЈ…жҳҜжҒ’зӯү</text>
<rect fill="#fff5f0" height="86" rx="6" stroke="#b85450" stroke-width="2" width="460" x="40" y="438"></rect>
<text fill="#7a2f2b" font-size="13" font-weight="700" text-anchor="middle" x="270" y="460">вҲӮW_q/вҲӮW_master := 1</text>
<text fill="#7a2f2b" font-size="11" text-anchor="middle" x="270" y="478">вҮ’ вҲӮL/вҲӮW_master = вҲӮL/вҲӮW_q   (зӣҙжҺҘйҖҸдј )</text>
<text fill="#7a2f2b" font-size="10.5" font-style="italic" text-anchor="middle" x="270" y="498">ж•°еӯҰдёҠжҳҜй”ҷзҡ„пјҲround еҜјж•°жҳҺжҳҺжҳҜ 0пјү</text>
<text fill="#7a2f2b" font-size="10.5" font-style="italic" text-anchor="middle" x="270" y="514">е®һйҷ…еҸҜиЎҢпјҡеҚ•жӯҘеҒҸе·®е°ҸгҖҒеӨҡжӯҘе№іеқҮиҝ‘йӣ¶</text>
</g>
<!-- RIGHT: Stochastic rounding (no STE) -->
<g transform="translate(620,72)">
<rect fill="#f4faf4" height="560" rx="10" stroke="#5fa55f" stroke-width="1.4" width="540" x="0" y="0"></rect>
<text fill="#1a5c1a" font-size="14" font-weight="700" text-anchor="middle" x="270" y="26">йҡҸжңә rounding В· дёҚйңҖиҰҒ STE</text>
<text fill="#1a5c1a" font-size="10.5" font-style="italic" text-anchor="middle" x="270" y="46">NVFP4 (NVIDIA Blackwell йў„и®ӯз»ғ recipe)</text>
<text fill="#1a5c1a" font-size="12" font-weight="700" x="20" y="76">[еүҚеҗ‘ (gradient и·Ҝеҫ„)] stochastic rounding</text>
<rect fill="#fff" height="60" rx="6" stroke="#333" width="460" x="40" y="92"></rect>
<text fill="#111" font-size="13" text-anchor="middle" x="270" y="114">stoch_round(x) = вҢҠxвҢӢ w.p. (вҢҲxвҢү - x)</text>
<text fill="#111" font-size="13" text-anchor="middle" x="270" y="134">                 вҢҲxвҢү w.p. (x - вҢҠxвҢӢ)</text>
<!-- key property -->
<rect fill="#f4faf4" height="50" rx="6" stroke="#5fa55f" stroke-width="2" width="460" x="40" y="166"></rect>
<text fill="#1a5c1a" font-size="13" font-weight="700" text-anchor="middle" x="270" y="188">е…ій”®жҖ§иҙЁпјҡE[ stoch_round(x) ] = x</text>
<text fill="#1a5c1a" font-size="11" text-anchor="middle" x="270" y="206">еҚігҖҢжңҹжңӣж„Ҹд№үдёҠзҡ„жҒ’зӯүеҮҪж•°гҖҚпјҲunbiased estimatorпјү</text>
<!-- Distribution plot -->
<g transform="translate(60,232)">
<rect fill="#fff" height="100" stroke="#9ca3af" width="200" x="0" y="0"></rect>
<line stroke="#333" x1="20" x2="180" y1="80" y2="80"></line>
<line stroke="#333" x1="20" x2="20" y1="20" y2="80"></line>
<!-- input x marked between two grid points -->
<line stroke="#9ca3af" stroke-dasharray="2 2" x1="60" x2="60" y1="80" y2="20"></line>
<line stroke="#9ca3af" stroke-dasharray="2 2" x1="120" x2="120" y1="80" y2="20"></line>
<text fill="#555" font-size="9" text-anchor="middle" x="60" y="92">вҢҠxвҢӢ</text>
<text fill="#555" font-size="9" text-anchor="middle" x="120" y="92">вҢҲxвҢү</text>
<line stroke="#5fa55f" stroke-width="2" x1="80" x2="80" y1="78" y2="40"></line>
<text fill="#1a5c1a" font-size="9" text-anchor="middle" x="80" y="35">x</text>
<!-- prob bars -->
<rect fill="#5fa55f" height="28" opacity="0.7" width="10" x="55" y="52"></rect>
<text fill="#1a5c1a" font-size="8" text-anchor="middle" x="60" y="48">66%</text>
<rect fill="#5fa55f" height="16" opacity="0.7" width="10" x="115" y="64"></rect>
<text fill="#1a5c1a" font-size="8" text-anchor="middle" x="120" y="60">33%</text>
</g>
<g transform="translate(280,232)">
<text fill="#1a5c1a" font-size="11" font-weight="700" x="0" y="20">зӣҙи§Ӯпјҡ</text>
<text fill="#1a5c1a" font-size="10" x="0" y="38">x = 0.66 вҶ’ д»Ҙ 66% жҰӮзҺҮиҲҚеҲ° 0пјҢ</text>
<text fill="#1a5c1a" font-size="10" x="0" y="54">      д»Ҙ 33% жҰӮзҺҮиҲҚеҲ° 1</text>
<text fill="#1a5c1a" font-size="10" x="0" y="76">жңҹжңӣ = 0Г—0.66 + 1Г—0.33 вүҲ 0.33</text>
<text fill="#7a4e00" font-size="10" font-weight="700" x="0" y="92">вҖҰ зӯүзӯүпјҹпјҒ</text>
<text fill="#1a5c1a" font-size="9" x="0" y="108">жіЁпјҡдёҠеӣҫдёәзҰ»ж•ЈзҪ‘ж јзӨәж„ҸпјҢ</text>
<text fill="#1a5c1a" font-size="9" x="0" y="122">е®һйҷ…жҳҜ вҢҠвҢү зҡ„жҰӮзҺҮеә”еҸҚиҝҮжқҘгҖӮ</text>
</g>
<!-- Backward derivation -->
<text fill="#1a5c1a" font-size="12" font-weight="700" x="20" y="360">[еҸҚеҗ‘] жўҜеәҰиҮӘз„¶йҖҡиҝҮ</text>
<rect fill="#fff" height="120" rx="6" stroke="#333" width="460" x="40" y="374"></rect>
<text fill="#111" font-size="11" text-anchor="middle" x="270" y="394">жҠҠ stoch_round еҶҷжҲҗ W_q = W_master + Оө  (E[Оө]=0)</text>
<text fill="#111" font-size="11" text-anchor="middle" x="270" y="414">y = matmul(W_q, x) = matmul(W_master + Оө, x)</text>
<text fill="#1a5c1a" font-size="11" font-weight="700" text-anchor="middle" x="270" y="434">вҲӮL/вҲӮW_master = вҲӮL/вҲӮy В· x  +  E[вҲӮОө/вҲӮW_master В· вҖҰ]</text>
<text fill="#1a5c1a" font-size="11" font-weight="700" text-anchor="middle" x="270" y="454">                = вҲӮL/вҲӮy В· x  (еҷӘеЈ°йЎ№жңҹжңӣ = 0)</text>
<text fill="#1a5c1a" font-size="10.5" font-style="italic" text-anchor="middle" x="270" y="478">ж— йңҖд»»дҪ•гҖҢеҒҮе®ҡ вҲӮQ/вҲӮx = 1гҖҚзҡ„дҪңејҠ</text>
<text fill="#1a5c1a" font-size="11.5" font-weight="700" x="20" y="518">вҮ’ STE еңЁ NVFP4 дҪ“зі»дёӢгҖҢдёҚеҝ…иҰҒгҖҒжңүж—¶еҸҚиҖҢжҚҹе®ізІҫеәҰгҖҚ</text>
<text fill="#1a5c1a" font-size="10" font-style="italic" x="20" y="536">вҖ” NVIDIA Nemotron QAD blog</text>
</g>
</svg>