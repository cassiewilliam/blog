<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4d5562"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}
      .title{font-size:28px;font-weight:700}
      .subtitle{font-size:13px;fill:#667085}
      .lane{font-size:14px;font-weight:700;fill:#667085}
      .head{font-size:15px;font-weight:700}
      .small{font-size:12.5px;fill:#344054}
      .formula{font-family:Georgia,"Times New Roman",serif;font-size:21px;font-style:italic}
      .sub{font-size:12px;baseline-shift:sub}
      .box{stroke-width:2}
      .thin{stroke-width:1.4}
      .edge{stroke:#4d5562;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#667085;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .cache{fill:#fff5f0;stroke:#b85450;stroke-width:1.6}
      .io{fill:#fff;stroke:#d0d7de;stroke-width:1.4}
    </style>
  </defs>

  <rect width="1120" height="470" fill="#fff"/>
  <text x="40" y="48" class="title">Top-K kernel: make the sortable key carry the expert id</text>
  <text x="40" y="76" class="subtitle">This explains the paper Figure 15: ties disappear because equal scores still have distinct packed low mantissa bits.</text>
  <rect x="65" y="125" width="175" height="84" rx="9" fill="#eef7ff" stroke="#4a6fd3" class="box"/>
  <text x="152.5" y="156" text-anchor="middle" class="head">Router row</text>
  <text x="152.5" y="183" text-anchor="middle" class="small">S[t, :]</text>
  <rect x="310" y="112" width="220" height="110" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="420.0" y="143" text-anchor="middle" class="head">Pack key</text>
  <text x="420.0" y="170" text-anchor="middle" class="small">score high bits</text>
  <text x="420.0" y="191" text-anchor="middle" class="small">expert id low bits</text>
  <rect x="600" y="112" width="220" height="110" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="710.0" y="143" text-anchor="middle" class="head">Register sort</text>
  <text x="710.0" y="170" text-anchor="middle" class="small">thread / warp</text>
  <text x="710.0" y="191" text-anchor="middle" class="small">compare-swap</text>
  <rect x="890" y="125" width="175" height="84" rx="9" fill="#eef7ff" stroke="#4a6fd3" class="box"/>
  <text x="977.5" y="156" text-anchor="middle" class="head">Top-K</text>
  <text x="977.5" y="183" text-anchor="middle" class="small">π[t,k], score</text>
  <path d="M240 167 L310 167" class="edge"/>
  <path d="M530 167 L600 167" class="edge"/>
  <path d="M820 167 L890 167" class="edge"/>
  <rect x="235" y="285" width="650" height="74" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="560" y="317" text-anchor="middle" class="formula"><tspan>key</tspan><tspan class="sub">e</tspan><tspan> = score</tspan><tspan class="sub">e</tspan><tspan> || e</tspan></text>
  <text x="560" y="344" text-anchor="middle" class="small">Sort by the packed FP32 value; the score and column id move together.</text>
  <path d="M420 222 L450 285" class="dash"/>
  <path d="M710 222 L685 285" class="dash"/>
</svg>
