<svg font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif" viewbox="0 0 1100 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="sw_ar" markerheight="6" markerwidth="6" orient="auto" refx="9" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#4b5563"></path></marker></defs>
<rect fill="#fff" height="460" width="1100"></rect>
<text fill="#111827" font-size="16" font-weight="700" text-anchor="middle" x="550" y="26">Activation 重构：用无 exp/div 的激活替代 SwiGLU</text>
<!-- LEFT: SwiGLU current -->
<g transform="translate(40,60)">
<rect fill="#fff5f0" height="380" rx="10" stroke="#b85450" stroke-width="1.3" width="500" x="0" y="0"></rect>
<text fill="#7a2f2b" font-size="13" font-weight="700" text-anchor="middle" x="250" y="22">SwiGLU (current V4)</text>
<!-- input -->
<rect fill="#fff" height="28" rx="6" stroke="#333" width="100" x="200" y="44"></rect>
<text font-family="monospace" font-size="10" text-anchor="middle" x="250" y="62">x : [h=7168]</text>
<!-- W_gate / W_up parallel -->
<rect fill="#eef3ff" height="36" rx="6" stroke="#4a6fd3" width="160" x="60" y="94"></rect>
<text font-size="10.5" font-weight="700" text-anchor="middle" x="140" y="108">W_gate · x</text>
<text font-family="monospace" font-size="9.5" text-anchor="middle" x="140" y="123">[h, d=3072] · [h] = [d]</text>
<rect fill="#eef3ff" height="36" rx="6" stroke="#4a6fd3" width="160" x="280" y="94"></rect>
<text font-size="10.5" font-weight="700" text-anchor="middle" x="360" y="108">W_up · x</text>
<text font-family="monospace" font-size="9.5" text-anchor="middle" x="360" y="123">[h, d=3072] · [h] = [d]</text>
<!-- silu -->
<rect fill="#fff4e0" height="34" rx="6" stroke="#e0b300" width="160" x="60" y="148"></rect>
<text font-size="10.5" font-weight="700" text-anchor="middle" x="140" y="162">silu = x · σ(x)</text>
<text fill="#7a4e00" font-size="9" text-anchor="middle" x="140" y="177">SFU: exp + division ⚠️</text>
<!-- mul -->
<rect fill="#f9eef8" height="28" rx="6" stroke="#a33ea1" width="180" x="160" y="200"></rect>
<text font-size="10.5" text-anchor="middle" x="250" y="218">silu(gate) ⊙ up : [d]</text>
<!-- W_down -->
<rect fill="#eef3ff" height="36" rx="6" stroke="#4a6fd3" width="180" x="160" y="248"></rect>
<text font-size="10.5" font-weight="700" text-anchor="middle" x="250" y="262">W_down · mid</text>
<text font-family="monospace" font-size="9.5" text-anchor="middle" x="250" y="277">[d, h] · [d] = [h]</text>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="250" x2="140" y1="72" y2="92"></line>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="250" x2="360" y1="72" y2="92"></line>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="140" x2="140" y1="130" y2="146"></line>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="360" x2="320" y1="130" y2="200"></line>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="140" x2="180" y1="182" y2="200"></line>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="250" x2="250" y1="228" y2="246"></line>
<!-- Cost -->
<line stroke="#e8c3bf" x1="20" x2="480" y1="304" y2="304"></line>
<text fill="#7a2f2b" font-size="11" font-weight="700" text-anchor="middle" x="250" y="324">代价</text>
<text font-family="monospace" font-size="10" x="30" y="342">params  P = 3·h·d  = 3 × 7168 × 3072 = 66.06 M / expert</text>
<text font-family="monospace" font-size="10" x="30" y="358">FLOPs   V_comp = 6·h·d = 132 M / token-expert</text>
<text font-family="monospace" font-size="10" x="30" y="374">comm    V_comm = 3·h  = 21,504 B / token-expert</text>
<text fill="#7a2f2b" font-family="monospace" font-size="10" font-weight="700" x="30" y="390">阈值    V_comp/V_comm = 2d = 6144 FLOPs/B</text>
</g>
<!-- RIGHT: no-gate -->
<g transform="translate(580,60)">
<rect fill="#f4faf4" height="380" rx="10" stroke="#5fa55f" stroke-width="1.3" width="500" x="0" y="0"></rect>
<text fill="#1a5c1a" font-size="13" font-weight="700" text-anchor="middle" x="250" y="22">提议: no-gate + 简单激活 (e.g. ReLU²)</text>
<rect fill="#fff" height="28" rx="6" stroke="#333" width="100" x="200" y="44"></rect>
<text font-family="monospace" font-size="10" text-anchor="middle" x="250" y="62">x : [h=7168]</text>
<!-- W_up only -->
<rect fill="#eef3ff" height="36" rx="6" stroke="#4a6fd3" width="180" x="160" y="94"></rect>
<text font-size="10.5" font-weight="700" text-anchor="middle" x="250" y="108">W_up · x</text>
<text font-family="monospace" font-size="9.5" text-anchor="middle" x="250" y="123">[h, d_new=4608] · [h] = [d_new]</text>
<!-- ReLU² -->
<rect fill="#fff4e0" height="34" rx="6" stroke="#e0b300" width="180" x="160" y="148"></rect>
<text font-size="10.5" font-weight="700" text-anchor="middle" x="250" y="162">ReLU(x)²  (no exp/div)</text>
<text fill="#1a5c1a" font-size="9" text-anchor="middle" x="250" y="177">cheap element-wise ✓</text>
<!-- W_down -->
<rect fill="#eef3ff" height="36" rx="6" stroke="#4a6fd3" width="180" x="160" y="200"></rect>
<text font-size="10.5" font-weight="700" text-anchor="middle" x="250" y="214">W_down · act</text>
<text font-family="monospace" font-size="9.5" text-anchor="middle" x="250" y="229">[d_new, h] · [d_new] = [h]</text>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="250" x2="250" y1="72" y2="92"></line>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="250" x2="250" y1="130" y2="146"></line>
<line marker-end="url(#sw_ar)" stroke="#4b5563" x1="250" x2="250" y1="182" y2="198"></line>
<!-- Cost -->
<line stroke="#c9e5c9" x1="20" x2="480" y1="252" y2="252"></line>
<text fill="#1a5c1a" font-size="11" font-weight="700" text-anchor="middle" x="250" y="272">收益（同样 param P=66 M/expert）</text>
<text font-family="monospace" font-size="10" x="30" y="290">d_new = (3/2) · d_old = 4608</text>
<text font-family="monospace" font-size="10" x="30" y="306">params  P = 2·h·d_new = 66.06 M ✓ 不变</text>
<text font-family="monospace" font-size="10" x="30" y="322">FLOPs   V_comp = 4·h·d_new = 132 M ✓ 不变</text>
<text font-family="monospace" font-size="10" x="30" y="338">comm    V_comm = 3·h = 21,504 B ✓ 不变</text>
<text fill="#1a5c1a" font-family="monospace" font-size="10" font-weight="700" x="30" y="354">阈值    2·d_new = 9216 FLOPs/B  ↑ 50%</text>
<text fill="#1a5c1a" font-size="10" x="30" y="376">+ 取消 SFU 路径（exp/div）：post-GEMM 段直接缩短</text>
<text fill="#1a5c1a" font-size="10" x="30" y="392">+ 阈值更高 → 同 hardware C/B 下 BW 余量更大</text>
</g>
</svg>