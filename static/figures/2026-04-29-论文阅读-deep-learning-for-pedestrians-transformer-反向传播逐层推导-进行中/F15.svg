<svg viewBox="0 0 1000 405" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="405" fill="#ffffff"/>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">GPT-style pre-norm block: residuals are gradient highways</text>
<text x="500" y="64" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">the paper closes the derivation by composing the layer rules</text>
<rect x="75" y="120" width="125" height="60" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="137" y="155" text-anchor="middle" font-family="monospace" font-size="15" font-weight="700" fill="#24292f">X</text>
<line x1="202" y1="150" x2="292" y2="150" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="292" y="120" width="125" height="60" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="354" y="145" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">LN</text>
<text x="354" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="400" fill="#57606a">pre-norm</text>
<line x1="419" y1="150" x2="509" y2="150" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="509" y="120" width="145" height="60" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="581" y="145" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">MHA + Wo</text>
<text x="581" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="400" fill="#57606a">attention path</text>
<line x1="656" y1="150" x2="746" y2="150" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="746" y="120" width="165" height="60" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="828" y="155" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">residual add</text>
<line x1="137" y1="183" x2="828" y2="230" stroke="#57606a" stroke-width="1.6" marker-end="url(#arrow)" stroke-dasharray="7 6"/>
<rect x="220" y="295" width="560" height="70" rx="8" fill="#fbf0fb" stroke="#a33ea1" stroke-width="2"/>
<text x="500" y="323" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#24292f">Backward rule for every residual: copy Δ to both branches, then sum at X</text>
<text x="500" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" fill="#57606a">The MLP sublayer repeats the same LN → FC → activation → FC → add pattern.</text>
</svg>
