<svg viewBox="0 0 1000 345" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="#333">batch_size × max_m 的性能甜点</text>
<g font-family="sans-serif" font-size="11">
  <line x1="100" y1="300" x2="900" y2="300" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="60" x2="100" y2="300" stroke="#333" stroke-width="1.5"/>
  <text x="500" y="330" text-anchor="middle" font-size="12" fill="#333">max_m (per expert)</text>
  <text x="50" y="180" font-size="12" fill="#333" transform="rotate(-90 50 180)">ITL / token (ms)</text>

  <!-- zones -->
  <rect x="100" y="60"  width="180" height="240" fill="#fff5f0" opacity="0.7"/>
  <text x="190" y="82"  text-anchor="middle" font-weight="700" fill="#4a1515">不推荐</text>
  <text x="190" y="100" text-anchor="middle" fill="#4a1515" font-size="10">batch &lt; 16</text>
  <text x="190" y="116" text-anchor="middle" fill="#4a1515" font-size="10">RDMA latency 主导</text>

  <rect x="280" y="60"  width="200" height="240" fill="#fff4e0" opacity="0.7"/>
  <text x="380" y="82"  text-anchor="middle" font-weight="700" fill="#7a4e00">过渡带</text>
  <text x="380" y="100" text-anchor="middle" fill="#5a3f00" font-size="10">16 ≤ batch &lt; 64</text>

  <rect x="480" y="60"  width="260" height="240" fill="#eef7ee" opacity="0.7"/>
  <text x="610" y="82"  text-anchor="middle" font-weight="700" fill="#1a3d1a">甜点</text>
  <text x="610" y="100" text-anchor="middle" fill="#1a3d1a" font-size="10">64 ≤ batch ≤ 256</text>
  <text x="610" y="116" text-anchor="middle" fill="#1a3d1a" font-size="10">Compute / Comm 平衡</text>

  <rect x="740" y="60"  width="160" height="240" fill="#eef3ff" opacity="0.7"/>
  <text x="820" y="82"  text-anchor="middle" font-weight="700" fill="#1f3a6f">显存限</text>
  <text x="820" y="100" text-anchor="middle" fill="#1f3a6f" font-size="10">staging + KV cache</text>

  <!-- ITL curve -->
  <path d="M110 250 Q 220 230 280 170 Q 380 120 480 110 Q 600 105 740 115 Q 820 130 900 180"
        fill="none" stroke="#b85450" stroke-width="2.5"/>
  <circle cx="110" cy="250" r="4" fill="#b85450"/>
  <circle cx="280" cy="170" r="4" fill="#b85450"/>
  <circle cx="480" cy="110" r="4" fill="#5fa55f"/>
  <circle cx="740" cy="115" r="4" fill="#5fa55f"/>

  <text x="180" y="265" font-size="10" fill="#333">8</text>
  <text x="280" y="315" font-size="10" fill="#333">16</text>
  <text x="380" y="315" font-size="10" fill="#333">32</text>
  <text x="480" y="315" font-size="10" fill="#333">64</text>
  <text x="610" y="315" font-size="10" fill="#333">128</text>
  <text x="740" y="315" font-size="10" fill="#333">256</text>
  <text x="820" y="315" font-size="10" fill="#333">512</text>
</g>
</svg>