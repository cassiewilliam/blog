<text fill="#5a3475" font-size="14" font-style="italic" font-weight="700" text-anchor="middle" x="570" y="690">dW₁</text>
<text fill="#5a3475" font-size="9" font-weight="700" text-anchor="middle" x="570" y="722">output</text>
