<svg viewBox="0 0 1000 345" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="15" fill="#4a1515">Decode 的核心约束：每步 1 token + 固定 shape + CUDA Graph</text>
<g font-family="sans-serif" font-size="11">
  <rect x="20"  y="48" width="160" height="60" rx="4" fill="#eef3ff" stroke="#4a6fd3"/>
  <text x="100" y="72" text-anchor="middle" font-weight="700">① MLA Decode</text>
  <text x="100" y="90" text-anchor="middle" fill="#1f3a6f">单 token KV append</text>

  <rect x="200" y="48" width="170" height="60" rx="4" fill="#f4eafe" stroke="#a33ea1"/>
  <text x="285" y="72" text-anchor="middle" font-weight="700">② Router TopK</text>
  <text x="285" y="90" text-anchor="middle" fill="#4a1a48">ε-bias (Blackwell UE8M0)</text>

  <rect x="390" y="48" width="180" height="60" rx="4" fill="#fff5f0" stroke="#b85450"/>
  <text x="480" y="72" text-anchor="middle" font-weight="700">③ DeepEP LL Dispatch</text>
  <text x="480" y="90" text-anchor="middle" fill="#4a1515">cooperative · SM=0</text>

  <rect x="590" y="48" width="180" height="60" rx="4" fill="#eef7ee" stroke="#5fa55f"/>
  <text x="680" y="72" text-anchor="middle" font-weight="700">④ DeepGEMM Masked</text>
  <text x="680" y="90" text-anchor="middle" fill="#1a3d1a">3D (E, max_m, K)</text>

  <rect x="790" y="48" width="180" height="60" rx="4" fill="#fff5f0" stroke="#b85450"/>
  <text x="880" y="72" text-anchor="middle" font-weight="700">⑤ DeepEP LL Combine</text>
  <text x="880" y="90" text-anchor="middle" fill="#4a1515">weighted-sum</text>
</g>
<g stroke="#555" stroke-width="1.6" fill="none">
  <line x1="180" y1="78" x2="200" y2="78" marker-end="url(#arr)"/>
  <line x1="370" y1="78" x2="390" y2="78" marker-end="url(#arr)"/>
  <line x1="570" y1="78" x2="590" y2="78" marker-end="url(#arr)"/>
  <line x1="770" y1="78" x2="790" y2="78" marker-end="url(#arr)"/>
</g>

<text x="500" y="140" text-anchor="middle" font-weight="700" font-size="14" fill="#1a3d1a" font-family="sans-serif">Prefill (HT) vs Decode (LL) — 为什么要两套后端？</text>

<g font-family="sans-serif" font-size="12">
  <rect x="60" y="160" width="420" height="170" rx="6" fill="#fff5f0" stroke="#b85450"/>
  <text x="270" y="184" text-anchor="middle" font-weight="700" fill="#4a1515">Prefill · HT · Contiguous</text>
  <text x="80" y="208" fill="#4a1515">• batch M_sum 可到数千 tokens</text>
  <text x="80" y="228" fill="#4a1515">• dispatch 用 NVLink+RDMA 双通路</text>
  <text x="80" y="248" fill="#4a1515">• expert tokens 压缩排列（-1 跳过）</text>
  <text x="80" y="268" fill="#4a1515">• 追求吞吐：RDMA 带宽打满</text>
  <text x="80" y="298" fill="#4a1515" font-weight="700">不适合 CUDA Graph（动态 shape）</text>

  <rect x="520" y="160" width="420" height="170" rx="6" fill="#eef7ee" stroke="#5fa55f"/>
  <text x="730" y="184" text-anchor="middle" font-weight="700" fill="#1a3d1a">Decode · LL · Masked</text>
  <text x="540" y="208" fill="#1a3d1a">• batch 只有几十 tokens</text>
  <text x="540" y="228" fill="#1a3d1a">• dispatch 用 cooperative kernel</text>
  <text x="540" y="248" fill="#1a3d1a">• 固定 shape (E, max_m, K)</text>
  <text x="540" y="268" fill="#1a3d1a">• 追求延迟：每步 ≤ 50 ms</text>
  <text x="540" y="298" fill="#1a3d1a" font-weight="700">CUDA Graph 友好 ✓</text>
</g>
</svg>