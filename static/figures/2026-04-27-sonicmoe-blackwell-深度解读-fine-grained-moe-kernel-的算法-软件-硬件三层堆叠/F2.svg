<text font-size="11" x="270" y="640"><tspan fill="#b85450" font-style="italic" font-weight="700">π</tspan>, <tspan fill="#b85450" font-style="italic" font-weight="700">X</tspan>, <tspan font-style="italic">dH</tspan></text>
