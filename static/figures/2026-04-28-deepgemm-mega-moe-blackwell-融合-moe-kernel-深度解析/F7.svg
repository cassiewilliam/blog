    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
  <style>
    .title{font:700 24px sans-serif;fill:#24292f}
    .sub{font:400 13px sans-serif;fill:#57606a}
    .mono{font:500 13px ui-monospace,Menlo,monospace;fill:#24292f}
  </style>
</defs>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">2-CTA cluster multicast</text>
<rect x="410" y="92" width="180" height="52" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="500" y="124" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#e0b300">B tile / Wfp4</text>
<line x1="470" y1="146" x2="310" y2="190" stroke="#e0b300" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="530" y1="146" x2="690" y2="190" stroke="#e0b300" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="145" y="170" width="260" height="118" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="275" y="202" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#4a6fd3">CTA 0</text>
<text x="275" y="230" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#24292f">A0 token tile</text>
<text x="275" y="254" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">TMEM0 accumulates</text>
<rect x="595" y="170" width="260" height="118" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="725" y="202" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#5fa55f">CTA 1</text>
