<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">Tensor Core evolution: where the accumulator lives</text>
<rect x="95" y="96" width="220" height="150" rx="8" fill="#f6f8fa" stroke="#57606a" stroke-width="2"/>
<text x="205" y="132" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#57606a">MMA</text>
<text x="205" y="164" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#24292f">warp</text>
<text x="205" y="184" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#24292f">acc: register</text>
<text x="205" y="204" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#24292f">operand: register</text>
<line x1="325" y1="170" x2="380" y2="170" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="390" y="96" width="220" height="150" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="500" y="132" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#4a6fd3">WGMMA</text>
<text x="500" y="164" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#24292f">warpgroup</text>
