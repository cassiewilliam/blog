<svg viewbox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="hca_ar" markerheight="7" markerwidth="7" orient="auto" refx="10" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#333"></path></marker></defs>
<rect fill="#fff" height="320" width="1000"></rect>
