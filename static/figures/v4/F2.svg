<text fill="#555" font-family="monospace" font-size="11" text-anchor="middle" x="500" y="350">V4-Pro @1M: 27% FLOPs, 10% KV · V4-Flash @1M: 10% FLOPs, 7% KV — reproduced from Figure 1</text>
