<svg font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif" viewbox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fff" height="380" width="1200"></rect>
<text fill="#111827" font-size="16" font-weight="700" text-anchor="middle" x="600" y="26">FP4 (E2M1) vs INT4 · 4-bit format 表征空间对比</text>
<text fill="#6b7280" font-size="11" text-anchor="middle" x="600" y="46">同样 4 个 bit · 不同的值分布与误差特性</text>
<!-- INT4 number line: uniform spacing -->
<g transform="translate(60,80)">
<text fill="#1a2d55" font-size="13" font-weight="700" x="0" y="0">INT4 (signed) · 16 个均匀间隔的整数点</text>
<line stroke="#333" stroke-width="1.5" x1="20" x2="1080" y1="40" y2="40"></line>
<circle cx="20" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="20" y="68">-7</text><circle cx="90" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="90" y="68">-6</text><circle cx="160" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="160" y="68">-5</text><circle cx="230" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="230" y="68">-4</text><circle cx="300" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="300" y="68">-3</text><circle cx="370" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="370" y="68">-2</text><circle cx="440" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="440" y="68">-1</text><circle cx="510" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="510" y="68">0</text><circle cx="580" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="580" y="68">1</text><circle cx="650" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="650" y="68">2</text><circle cx="720" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="720" y="68">3</text><circle cx="790" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="790" y="68">4</text><circle cx="860" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="860" y="68">5</text><circle cx="930" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="930" y="68">6</text><circle cx="1000" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="1000" y="68">7</text><circle cx="1070" cy="40" fill="#4a6fd3" r="6"></circle><text fill="#1a2d55" font-size="10" text-anchor="middle" x="1070" y="68">8</text>
<text fill="#555" font-size="10.5" font-style="italic" text-anchor="middle" x="540" y="100">均匀间距 · 量化误差恒定 = 1/2 · scale</text>
<text fill="#555" font-size="10.5" text-anchor="middle" x="540" y="116">动态范围 ≈ 14× scale (从 -7 到 +7)</text>
</g>
<!-- FP4 (E2M1) number line: log-spaced -->
<g transform="translate(60,220)">
<text fill="#1a5c1a" font-size="13" font-weight="700" x="0" y="0">FP4 (E2M1) · 16 个对数分布的浮点点</text>
<line stroke="#333" stroke-width="1.5" x1="20" x2="1080" y1="40" y2="40"></line>
<circle cx="60" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="60" y="68">-6</text><circle cx="140" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="140" y="68">-4</text><circle cx="200" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="200" y="68">-3</text><circle cx="260" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="260" y="68">-2</text><circle cx="300" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="300" y="68">-1.5</text><circle cx="340" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="340" y="68">-1</text><circle cx="380" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="380" y="68">-0.5</text><circle cx="480" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="480" y="68">-0</text><circle cx="520" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="520" y="68">+0</text><circle cx="620" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="620" y="68">+0.5</text><circle cx="660" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="660" y="68">+1</text><circle cx="700" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="700" y="68">+1.5</text><circle cx="740" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="740" y="68">+2</text><circle cx="800" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="800" y="68">+3</text><circle cx="860" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="860" y="68">+4</text><circle cx="940" cy="40" fill="#5fa55f" r="6"></circle><text fill="#1a5c1a" font-size="10" text-anchor="middle" x="940" y="68">+6</text>
<text fill="#555" font-size="10.5" font-style="italic" text-anchor="middle" x="540" y="100">log 间距 · 小值密、大值疏 · 适合 long-tail / outlier 分布</text>
<text fill="#555" font-size="10.5" text-anchor="middle" x="540" y="116">动态范围 ≈ 12× scale，但<b>能直接命中 outlier 的指数尺度</b></text>
</g>
<text fill="#666" font-size="10.5" x="60" y="358">• MoE expert 权重通常呈 long-tail 分布（少数大值 + 大量小值）→ FP4 表征更贴合</text>
<text fill="#666" font-size="10.5" x="60" y="374">• 经过 LayerNorm 后的「集中分布」激活 → INT4 表征更贴合（量化误差均匀小）</text>
</svg>