<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; }
      .green { fill: #dff8ec; stroke: #20a66b; }
      .blue { fill: #e5f0ff; stroke: #3b82f6; }
      .amber { fill: #fff3d8; stroke: #f59e0b; }
      .rose { fill: #ffe4e6; stroke: #fb7185; }
      .purple { fill: #f0e7ff; stroke: #8b5cf6; }
      .ink { stroke: #334155; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="920" height="430"/>
  <text class="title" x="36" y="44">NVFP4 与 MXFP4：差异不在 4-bit 元素，而在 scale</text>
  <rect class="panel blue" x="48" y="88" width="390" height="220" rx="8"/>
  <text class="label" x="66" y="118">NVFP4</text>
  <text class="small" x="66" y="144">元素: FP4 E2M1, 范围约 [-6, 6]</text>
  <text class="small" x="66" y="164">block: 16 个连续元素</text>
  <text class="small" x="66" y="184">block scale: FP8 E4M3, 可表示非 2 的幂</text>
  <text class="small" x="66" y="204">tensor scale: FP32, 扩展整体动态范围</text>
  <rect class="panel amber" x="484" y="88" width="390" height="220" rx="8"/>
  <text class="label" x="502" y="118">MXFP4 / OCP MX</text>
  <text class="small" x="502" y="144">元素: FP4 E2M1</text>
  <text class="small" x="502" y="164">block: 32 个连续元素</text>
  <text class="small" x="502" y="184">block scale: E8M0, 基本是 2 的幂</text>
  <text class="small" x="502" y="204">无 NVIDIA NVFP4 的第二级 FP32 tensor scale</text>
  <rect class="green" x="76" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="96" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="116" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="136" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="156" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="176" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="196" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="216" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="236" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="256" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="276" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="296" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="316" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="336" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="356" y="332" width="15" height="44" rx="3"/>
  <rect class="green" x="376" y="332" width="15" height="44" rx="3"/>
  <text class="mono" x="82" y="399">16 x E2M1 payload</text>
  <rect class="amber" x="420" y="326" width="62" height="56" rx="6"/>
  <text class="mono" x="428" y="359">E4M3</text>
  <rect class="purple" x="520" y="326" width="78" height="56" rx="6"/>
  <text class="mono" x="530" y="359">FP32</text>
  <path class="ink" d="M 396 354 L 420 354"/>
  <path class="ink" d="M 482 354 L 520 354"/>
  <text class="mono" x="636" y="350">解码: x = q_e2m1 * s_block * s_global</text>
  <text class="small" x="636" y="376">核心收益: 更细 block + 更精细 scale -&gt; 更少 scale 量化误差</text>
</svg>
