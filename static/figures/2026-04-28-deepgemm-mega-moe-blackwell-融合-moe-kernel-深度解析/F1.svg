<svg viewBox="0 0 1000 490" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
  <style>
    .title{font:700 24px sans-serif;fill:#24292f}
    .sub{font:400 13px sans-serif;fill:#57606a}
    .mono{font:500 13px ui-monospace,Menlo,monospace;fill:#24292f}
  </style>
</defs>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">Mega MoE FFN dataflow: fold routing weight before Combine</text>
<text x="55" y="82" text-anchor="start" font-family="sans-serif" font-size="15" font-weight="700" fill="#b85450">Separated kernels</text>
<text x="945" y="82" text-anchor="end" font-family="sans-serif" font-size="12" font-weight="500" fill="#57606a">same MoE math, exposed boundaries</text>
<rect x="45" y="112" width="170" height="86" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="130.0" y="136" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">Dispatch</text>
<text x="130.0" y="163" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">X<tspan baseline-shift="sub" font-size="9.4">g</tspan>, s<tspan baseline-shift="sub" font-size="9.4">g</tspan></text>
<text x="130.0" y="182" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">← gather(X, π, s)</text>
<line x1="221" y1="155" x2="229" y2="155" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="235" y="112" width="170" height="86" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="320.0" y="136" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">Linear1</text>
<text x="320.0" y="163" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">H<tspan baseline-shift="sub" font-size="9.4">e</tspan> = X<tspan baseline-shift="sub" font-size="9.4">g</tspan> W<tspan baseline-shift="sub" font-size="9.4">1,e</tspan><tspan baseline-shift="super" font-size="9.4">T</tspan></text>
<text x="320.0" y="182" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">H<tspan baseline-shift="sub" font-size="9.4">e</tspan> = [G<tspan baseline-shift="sub" font-size="9.4">e</tspan>, U<tspan baseline-shift="sub" font-size="9.4">e</tspan>]</text>
<line x1="411" y1="155" x2="419" y2="155" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="425" y="112" width="170" height="86" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="510.0" y="136" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">SwiGLU + s</text>
<text x="510.0" y="163" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">A<tspan baseline-shift="sub" font-size="9.4">e</tspan> = SiLU(G<tspan baseline-shift="sub" font-size="9.4">e</tspan>) * U<tspan baseline-shift="sub" font-size="9.4">e</tspan></text>
<text x="510.0" y="182" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">A<tspan baseline-shift="sub" font-size="9.4">e</tspan> ← A<tspan baseline-shift="sub" font-size="9.4">e</tspan> * s<tspan baseline-shift="sub" font-size="9.4">g</tspan></text>
<line x1="601" y1="155" x2="609" y2="155" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="615" y="112" width="170" height="86" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="700.0" y="136" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">Linear2</text>
<text x="700.0" y="163" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">Z<tspan baseline-shift="sub" font-size="9.4">t,k</tspan> = A<tspan baseline-shift="sub" font-size="9.4">e</tspan> W<tspan baseline-shift="sub" font-size="9.4">2,e</tspan><tspan baseline-shift="super" font-size="9.4">T</tspan></text>
<text x="700.0" y="182" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">BF16 slot</text>
<line x1="791" y1="155" x2="799" y2="155" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="805" y="112" width="170" height="86" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="890.0" y="136" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">Combine</text>
<text x="890.0" y="163" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">Y<tspan baseline-shift="sub" font-size="9.4">t</tspan> = Σ<tspan baseline-shift="sub" font-size="9.4">k</tspan> Z<tspan baseline-shift="sub" font-size="9.4">t,k</tspan></text>
<text x="890.0" y="182" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="13" font-weight="500" fill="#24292f">slot sum</text>
<line x1="500" y1="210" x2="500" y2="250" stroke="#b85450" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="245" y="250" width="510" height="48" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="1.6"/>
<text x="500" y="270" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#b85450">HBM / runtime materializes X_g, H_e, A_e, Z_{t,k}</text>
<text x="500" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#57606a">top-k weight s is already folded before Linear2</text>
<text x="55" y="338" text-anchor="start" font-family="sans-serif" font-size="15" font-weight="700" fill="#5fa55f">Mega MoE</text>
<rect x="155" y="354" width="690" height="72" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="500" y="379" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#5fa55f">persistent kernel over expert waves</text>
<text x="500" y="404" text-anchor="middle" font-family="Georgia,Times New Roman,serif" font-size="14" font-weight="600" fill="#24292f">D(X,π,s)  ∥  L1(W<tspan baseline-shift="sub" font-size="10.1">1</tspan>)  ∥  SiLU*s+Q  ∥  L2(W<tspan baseline-shift="sub" font-size="10.1">2</tspan>)  ∥  Σ<tspan baseline-shift="sub" font-size="10.1">k</tspan> slot<tspan baseline-shift="sub" font-size="10.1">k</tspan></text>
<line x1="500" y1="300" x2="500" y2="350" stroke="#5fa55f" stroke-width="2" marker-end="url(#arrow)"/>
<text x="500" y="462" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">Semantics stay fixed; lifetimes shrink from global tensors to SMEM / TMEM / registers.</text>
</svg>
