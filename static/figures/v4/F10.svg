<svg viewbox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fff" height="280" width="1000"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="500" y="24">On-disk SWA KV Cache · three storage strategies</text>
<g transform="translate(40,52)"><rect fill="#fff5f0" height="200" rx="6" stroke="#b85450" width="280" x="0" y="0"></rect><text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="140" y="24">① Full SWA Caching</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="140" y="46">store SWA KV of every token</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="140" y="64">size ∝ L · 8 (≈ 8× CSA/HCA)</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="92">on hit: read only the last n_win tokens</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="110">zero re-compute · SSD write-unbalanced</text><text fill="#b85450" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="140" y="145">✔ zero re-compute</text><text fill="#b85450" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="140" y="165">✘ largest storage, write amplification</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="185">good for frequent long-prefix hits</text></g>
<g transform="translate(360,52)"><rect fill="#fff4e0" height="200" rx="6" stroke="#e0b300" width="280" x="0" y="0"></rect><text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="140" y="24">② Periodic Checkpointing</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="140" y="46">checkpoint last n_win every p tokens</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="140" y="64">size ∝ L · n_win / p</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="92">on hit: load nearest ckpt + recompute tail</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="110">tunable p · smooth storage/compute trade-off</text><text fill="#7a4e00" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="140" y="145">✔ adjustable dial</text><text fill="#7a4e00" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="140" y="165">~ recomputes &lt;= p tokens</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="185">production default</text></g>
<g transform="translate(680,52)"><rect fill="#f4faf4" height="200" rx="6" stroke="#5fa55f" width="280" x="0" y="0"></rect><text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="140" y="24">③ Zero SWA Caching</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="140" y="46">store no SWA KV</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="140" y="64">size = 0 (only CSA/HCA)</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="92">on hit: recompute n_win · L tokens</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="110">reuses stored CSA/HCA to reconstruct</text><text fill="#1a3d1a" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="140" y="145">✔ zero storage</text><text fill="#1a3d1a" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle" x="140" y="165">✘ heavy on-hit re-compute</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="140" y="185">for tight-disk deployments</text></g>
</svg>