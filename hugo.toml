baseURL = "http://150.158.53.42/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Min Yang 的报告博客"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
pygmentsUseClasses = true
enableInlineShortcodes = true

[params]
  env = "production"
  description = "自动生成的报告与笔记"
  author = "Min Yang"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false
  DateFormat = "2006-01-02"

[params.homeInfoParams]
  Title = "报告与笔记"
  Content = "自动化生成的分析报告。"

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
