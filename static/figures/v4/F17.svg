<svg viewbox="0 0 1100 340" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fff" height="340" width="1100"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="550" y="24">KV-cache byte layout per token  (fp8_ds_mla format · 584 B / token)</text>
<g transform="translate(40,56)">
<!-- axis -->
<text fill="#555" font-family="monospace" font-size="10" x="0" y="0">byte 0</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="420" y="0">448</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="700" y="0">576</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="end" x="1020" y="0">583</text>
<rect fill="#fff5f0" height="60" stroke="#b85450" width="420" x="0" y="8"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="210" y="36">NoPE  (448 B)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="210" y="56">448 × fp8_e4m3  (no positional encoding)</text>
<rect fill="#eef3ff" height="60" stroke="#4a6fd3" width="280" x="420" y="8"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="560" y="36">RoPE  (128 B)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="560" y="56">64 × bf16 (rotary head_dim = 64)</text>
<rect fill="#fff4e0" height="60" stroke="#e0b300" width="320" x="700" y="8"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="860" y="36">UE8M0 scales + pad (8 B)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="860" y="56">7 × 1 B  (one per 64-elem FP8 tile)  +  1 B pad</text>
</g>
<!-- Block -->
<text fill="#333" font-family="sans-serif" font-size="13" font-weight="700" x="40" y="160">Block layout</text>
<text font-family="monospace" font-size="11" x="40" y="180">DeepseekV4SWACache.kv_cache : [num_blocks, 64, 584]   uint8   ·   block = 64 tokens × 584 B = 36,352 B = 35.5 KB</text>
<text font-family="monospace" font-size="11" x="40" y="198">DeepseekV4IndexerCache      : [num_blocks, 64, 128]   uint8   FP8 K only (no V) for lightning indexer</text>
<text font-family="monospace" font-size="11" x="40" y="216">Compressed main KV          : [num_blocks, 64, 576]   uint8   (indexer K is 128 B; compressed KV matches SWA geometry)</text>
<text font-family="monospace" font-size="11" x="40" y="234">CompressorStateCache        : [num_blocks, 4, 2·c=1024] float32 (C4A)   ·   [num_blocks, 8, 1024] float32 (C128A)</text>
<text fill="#333" font-family="sans-serif" font-size="13" font-weight="700" x="40" y="270">Allocation</text>
<text font-family="monospace" font-size="11" x="40" y="290">alignment = 576 B   (FlashMLA requirement; compressor states padded to the same boundary)</text>
<text font-family="monospace" font-size="11" x="40" y="308">block_size = 64  ·  per-token 576 B compressed or 584 B SWA  ·  slot_mapping gives byte offset within block</text>
<text fill="#555" font-family="monospace" font-size="11" x="40" y="326">note: swa_kv_cache.view(-1) returns flat uint8 buffer that fused_qnorm_rope_kv_rope_quant_insert writes into directly</text>
</svg>