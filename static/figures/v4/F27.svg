<svg viewbox="0 0 1100 340" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="ar_ar" markerheight="7" markerwidth="7" orient="auto" refx="10" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#333"></path></marker></defs>
<rect fill="#fff" height="340" width="1100"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="550" y="24">Anticipatory Routing · step t 的路由用 step t−Δt 的参数</text>
<!-- Timeline -->
<line stroke="#333" x1="60" x2="1040" y1="100" y2="100"></line>
<text font-family="monospace" font-size="11" x="60" y="130">step t−Δt</text>
<text font-family="monospace" font-size="11" x="540" y="130">step t</text>
<text font-family="monospace" font-size="11" x="1000" y="130">time →</text>
<line stroke="#333" x1="60" x2="60" y1="96" y2="104"></line>
<line stroke="#333" x1="540" x2="540" y1="96" y2="104"></line>
<!-- Prefetch -->
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="200" x="30" y="60"></rect>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="130" y="78">prefetch data for step t</text>
<line marker-end="url(#ar_ar)" stroke="#4a6fd3" stroke-dasharray="4 3" x1="230" x2="540" y1="74" y2="74"></line>
<!-- Route precompute -->
<rect fill="#fff5f0" height="28" stroke="#b85450" width="250" x="245" y="60"></rect>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="370" y="78">compute routing on θ_{t−Δt}</text>
<!-- Main training step -->
<rect fill="#f9eef8" height="28" stroke="#a33ea1" width="400" x="540" y="60"></rect>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="740" y="78">step t:  features on θ_t  +  prefetched routing indices  → loss + bwd</text>
<!-- Detail -->
<rect fill="#fff4e0" height="170" rx="4" stroke="#e0b300" width="510" x="30" y="160"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="285" y="182">Why it works</text>
<text font-family="monospace" font-size="11" x="45" y="206">• conventional: features + routing both driven by θ_t</text>
<text font-family="monospace" font-size="11" x="45" y="224">  → outlier in θ_t creates self-reinforcing loop via router</text>
<text font-family="monospace" font-size="11" x="45" y="242">• V4: decouple synchronous update of backbone and router</text>
<text font-family="monospace" font-size="11" x="45" y="260">• routing decisions use θ_{t−Δt} (already stable)</text>
<text fill="#7a4e00" font-family="monospace" font-size="11" x="45" y="280">→ breaks the outlier → expert imbalance → bigger outlier cycle</text>
<text fill="#7a4e00" font-family="monospace" font-size="11" x="45" y="300">→ empirical: loss spikes around step 12k disappear</text>
<rect fill="#f4faf4" height="170" rx="4" stroke="#5fa55f" width="500" x="570" y="160"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="820" y="182">Engineering cost &amp; trigger</text>
<text font-family="monospace" font-size="11" x="585" y="206">• extra forward pass for routing = ≈ 20% wall time if always on</text>
<text font-family="monospace" font-size="11" x="585" y="224">• V4 triggers Anticipatory Routing ONLY on detected loss spike</text>
<text font-family="monospace" font-size="11" x="585" y="242">• system rolls back, activates, runs a short window, then reverts</text>
<text font-family="monospace" font-size="11" x="585" y="260">• amortized wall-time overhead ≈ 0</text>
<text font-family="monospace" font-size="11" x="585" y="280">• pipeline carefully orchestrated with EP comm overlap</text>
<text fill="#1a3d1a" font-family="monospace" font-size="11" x="585" y="300">→ opportunistic fix: production uses it when needed, not by default</text>
</svg>