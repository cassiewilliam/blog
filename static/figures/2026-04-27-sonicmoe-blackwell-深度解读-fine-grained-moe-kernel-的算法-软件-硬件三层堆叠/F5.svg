<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
<defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}.title{font-size:32px;font-weight:700}.h{font-size:16px;font-weight:700}.p{font-size:13px}.box{stroke-width:2;rx:10}.note{stroke-width:1.5;rx:8}.e{stroke:#555;stroke-width:2;fill:none;marker-end:url(#a)}</style></defs>
<text x="30" y="48" class="title">SonicMoE optimization map from router to HBM</text>
<rect x="30" y="100" width="205" height="150" fill="#dae8fc" stroke="#6c8ebf" class="box"/><text x="132.5" y="128" text-anchor="middle" class="h">Router / routing</text><text x="132.5" y="158" text-anchor="middle" class="p">top-K sorting kernel</text><text x="132.5" y="182" text-anchor="middle" class="p">top-K softmax fusion</text><text x="132.5" y="206" text-anchor="middle" class="p">token rounding TR</text><text x="132.5" y="230" text-anchor="middle" class="p">custom router interface</text><rect x="260" y="100" width="205" height="150" fill="#d5e8d4" stroke="#82b366" class="box"/><text x="362.5" y="128" text-anchor="middle" class="h">GMEM → SMEM load</text><text x="362.5" y="158" text-anchor="middle" class="p">gather fusion on M dim</text><text x="362.5" y="182" text-anchor="middle" class="p">gather fusion on K dim</text><text x="362.5" y="206" text-anchor="middle" class="p">cp.async / TMA gather4</text><text x="362.5" y="230" text-anchor="middle" class="p">relay warp for 2CTA gather</text><rect x="490" y="100" width="205" height="150" fill="#fff2cc" stroke="#d6b656" class="box"/><text x="592.5" y="128" text-anchor="middle" class="h">Grouped GEMM mainloop</text><text x="592.5" y="158" text-anchor="middle" class="p">varlen-M / varlen-K kernels</text><text x="592.5" y="182" text-anchor="middle" class="p">Ping-Pong scheduling on Hopper</text><text x="592.5" y="206" text-anchor="middle" class="p">UMMA + TMEM on Blackwell</text><text x="592.5" y="230" text-anchor="middle" class="p">2CTA MMA + CLC scheduler</text><rect x="720" y="100" width="205" height="150" fill="#e1d5e7" stroke="#9673a6" class="box"/><text x="822.5" y="128" text-anchor="middle" class="h">Epilogue fusion</text><text x="822.5" y="158" text-anchor="middle" class="p">SwiGLU / dSwiGLU</text><text x="822.5" y="182" text-anchor="middle" class="p">dH + dS + A_S outputs</text><text x="822.5" y="206" text-anchor="middle" class="p">async TMA load of H</text><text x="822.5" y="230" text-anchor="middle" class="p">async TMA store for heavy stores</text><rect x="950" y="100" width="205" height="150" fill="#f8cecc" stroke="#b85450" class="box"/><text x="1052.5" y="128" text-anchor="middle" class="h">Output / aggregation</text><text x="1052.5" y="158" text-anchor="middle" class="p">keep transient Y recyclable</text><text x="1052.5" y="182" text-anchor="middle" class="p">gather-and-sum aggregation</text><text x="1052.5" y="206" text-anchor="middle" class="p">avoid atomic scatter</text><text x="1052.5" y="230" text-anchor="middle" class="p">avoid sync st.global scatter fusion</text><path d="M235 175 H260" class="e"/><path d="M465 175 H490" class="e"/><path d="M695 175 H720" class="e"/><path d="M925 175 H950" class="e"/><rect x="30" y="310" width="205" height="115" fill="#fff" stroke="#666" class="note"/><text x="132.5" y="336" text-anchor="middle" class="h">Router overhead</text><text x="132.5" y="363" text-anchor="middle" class="p">torch.topk can be ~40% of router time;</text><text x="132.5" y="383" text-anchor="middle" class="p">generic top-K becomes visible after compute</text><text x="132.5" y="403" text-anchor="middle" class="p">kernels get faster.</text><path d="M132.5 250 V310" class="e"/><rect x="260" y="310" width="205" height="115" fill="#fff" stroke="#666" class="note"/><text x="362.5" y="336" text-anchor="middle" class="h">HBM traffic</text><text x="362.5" y="363" text-anchor="middle" class="p">Separate gather/pad materializes O(TKd)</text><text x="362.5" y="383" text-anchor="middle" class="p">buffers; fused load keeps source tensor</text><text x="362.5" y="403" text-anchor="middle" class="p">compact and L2-friendly.</text><path d="M362.5 250 V310" class="e"/><rect x="490" y="310" width="205" height="115" fill="#fff" stroke="#666" class="note"/><text x="592.5" y="336" text-anchor="middle" class="h">Small GEMM tiles</text><text x="592.5" y="363" text-anchor="middle" class="p">Fine-grained experts reduce arithmetic</text><text x="592.5" y="383" text-anchor="middle" class="p">intensity; persistent scheduling and tile</text><text x="592.5" y="403" text-anchor="middle" class="p">sharing keep SMs busy.</text><path d="M592.5 250 V310" class="e"/><rect x="720" y="310" width="205" height="115" fill="#fff" stroke="#666" class="note"/><text x="822.5" y="336" text-anchor="middle" class="h">Heavy epilogue</text><text x="822.5" y="363" text-anchor="middle" class="p">dSwiGLU/reduction/multi-output store would</text><text x="822.5" y="383" text-anchor="middle" class="p">stall MMA unless overlapped with async IO.</text><path d="M822.5 250 V310" class="e"/><rect x="950" y="310" width="205" height="115" fill="#fff" stroke="#666" class="note"/><text x="1052.5" y="336" text-anchor="middle" class="h">Aggregation choice</text><text x="1052.5" y="363" text-anchor="middle" class="p">Scatter fusion looks attractive but hurts</text><text x="1052.5" y="383" text-anchor="middle" class="p">determinism/BF16 atomic/all2all and may</text><text x="1052.5" y="403" text-anchor="middle" class="p">block next MMA tile.</text><path d="M1052.5 250 V310" class="e"/><rect x="95" y="500" width="1010" height="80" fill="#fff" stroke="#666" class="note"/><text x="600" y="530" text-anchor="middle" class="h">Design rule: optimize the whole MoE workflow, not just one GEMM.</text><text x="600" y="558" text-anchor="middle" class="p">SonicMoE wins by deciding what never materializes, what fuses into load/epilogue, what overlaps with MMA, and what remains as a separate memory-bound kernel.</text></svg>