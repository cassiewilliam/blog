<line x1="232" y1="196" x2="395" y2="272" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="395" y="92" width="150" height="58" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="470" y="127" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="700" fill="#24292f">u<tspan baseline-shift="-25%" font-size="9.8">1</tspan> = f<tspan baseline-shift="-25%" font-size="9.8">1</tspan>(v)</text>
