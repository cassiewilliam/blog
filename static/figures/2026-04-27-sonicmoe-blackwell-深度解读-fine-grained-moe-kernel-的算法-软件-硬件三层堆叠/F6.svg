<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4d5562"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}
      .title{font-size:30px;font-weight:700}
      .lane{font-size:14px;font-weight:700;fill:#667085}
      .head{font-size:16px;font-weight:700}
      .small{font-size:12.5px;fill:#344054}
      .formula{font-family:Georgia,"Times New Roman",serif;font-size:22px;font-style:italic}
      .op{font-style:normal}
      .sub{font-size:13px;baseline-shift:sub}
      .box{stroke-width:2}
      .thin{stroke-width:1.5}
      .edge{stroke:#4d5562;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#667085;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1180" height="560" fill="#fff"/>
  <text x="40" y="52" class="title">Router-side optimization: same routing vs. tile-shaped routing</text>

  <text x="55" y="112" class="lane">A · implementation lever</text>
  <rect x="55" y="135" width="165" height="82" rx="9" fill="#eef7ff" stroke="#4a6fd3" class="box"/>
  <text x="137.5" y="166" text-anchor="middle" class="head">Logits</text>
  <text x="137.5" y="193" text-anchor="middle" class="formula">S<tspan class="sub">t</tspan></text>

  <rect x="275" y="125" width="210" height="102" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="380" y="164" text-anchor="middle" class="head">Top-K kernel</text>
  <text x="380" y="191" text-anchor="middle" class="small">same token-choice</text>

  <rect x="540" y="125" width="275" height="102" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="677.5" y="160" text-anchor="middle" class="formula">
    <tspan>(π<tspan class="sub">t</tspan>, α<tspan class="sub">t</tspan>)</tspan>
    <tspan class="op"> = TopK</tspan><tspan class="sub">K</tspan><tspan>(S<tspan class="sub">t</tspan>)</tspan>
  </text>
  <text x="677.5" y="194" text-anchor="middle" class="small">routing metadata is unchanged</text>

  <rect x="870" y="135" width="220" height="82" rx="9" fill="#eef7ff" stroke="#4a6fd3" class="box"/>
  <text x="980" y="166" text-anchor="middle" class="head">MoE kernels</text>
  <text x="980" y="193" text-anchor="middle" class="small">consume π and α</text>

  <path d="M220 176 H275" class="edge"/>
  <path d="M485 176 H540" class="edge"/>
  <path d="M815 176 H870" class="edge"/>

  <text x="55" y="308" class="lane">B · policy / shape lever</text>
  <rect x="275" y="330" width="210" height="94" rx="9" fill="#fff5f0" stroke="#b85450" class="box"/>
  <text x="380" y="366" text-anchor="middle" class="head">Token rounding</text>
  <text x="380" y="394" text-anchor="middle" class="small">training-time route counts</text>

  <rect x="540" y="318" width="275" height="118" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="677.5" y="361" text-anchor="middle" class="formula">
    <tspan>n′</tspan><tspan class="sub">e</tspan>
    <tspan class="op"> = ⌈</tspan><tspan>n</tspan><tspan class="sub">e</tspan>
    <tspan class="op"> / </tspan><tspan>M</tspan><tspan class="sub">tile</tspan><tspan class="op">⌉ </tspan>
    <tspan>M</tspan><tspan class="sub">tile</tspan>
  </text>
  <text x="677.5" y="397" text-anchor="middle" class="small">counts are aligned to GEMM tiles</text>

  <rect x="870" y="318" width="220" height="118" rx="9" fill="#f4faf4" stroke="#5fa55f" class="box"/>
  <text x="980" y="348" text-anchor="middle" class="head">Tail tile</text>
  <text x="900" y="379" class="small">before</text>
  <rect x="950" y="367" width="26" height="18" fill="#4a6fd3" opacity=".8"/>
  <rect x="979" y="367" width="26" height="18" fill="#4a6fd3" opacity=".8"/>
  <rect x="1008" y="367" width="26" height="18" fill="#4a6fd3" opacity=".8"/>
  <rect x="1037" y="367" width="15" height="18" fill="#b85450" opacity=".75"/>
  <text x="900" y="411" class="small">after</text>
  <rect x="950" y="399" width="26" height="18" fill="#5fa55f" opacity=".86"/>
  <rect x="979" y="399" width="26" height="18" fill="#5fa55f" opacity=".86"/>
  <rect x="1008" y="399" width="26" height="18" fill="#5fa55f" opacity=".86"/>
  <rect x="1037" y="399" width="26" height="18" fill="#5fa55f" opacity=".86"/>

  <path d="M677.5 227 C677.5 270 380 276 380 330" class="dash"/>
  <path d="M485 377 H540" class="edge"/>
  <path d="M815 377 H870" class="edge"/>
  <path d="M980 318 C980 276 980 250 980 217" class="dash"/>

  <rect x="95" y="485" width="990" height="44" rx="8" fill="#f7f8fa" stroke="#d0d7de" class="thin"/>
  <text x="590" y="513" text-anchor="middle" class="small">
    Top-K kernel preserves routing semantics; token rounding changes counts so compute tiles waste less work.
  </text>
</svg>
