<svg font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif" viewbox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fff" height="620" width="1100"></rect>
<text fill="#111827" font-size="16" font-weight="700" text-anchor="middle" x="550" y="26">C / B 阈值地图 · 4 个代表性 GPU 在 V4-Pro MoE 上的位置</text>
<text fill="#6b7280" font-size="11" text-anchor="middle" x="550" y="46">阈值 = 2·d_intermediate = 6144 FLOPs/Byte · 横轴：FP8 dense compute · 纵轴：NVLink per-direction BW</text>
<text fill="#9ca3af" font-size="10" font-style="italic" text-anchor="middle" x="550" y="64">公式：required_BW (GB/s) = compute (PFLOPs) × 1024 / 6.144 · 紫色虚线即为这条等式曲线</text>
<g transform="translate(80,90)">
<rect fill="#fafbfc" height="400" stroke="#d0d7de" width="940" x="0" y="0"></rect>
<!-- Above-threshold (green tint) -->
<polygon fill="#f4faf4" opacity="0.55" points="60,360 60,40 612,40"></polygon>
<!-- Below-threshold (red tint) -->
<polygon fill="#fff5f0" opacity="0.55" points="60,360 612,40 900,40 900,360"></polygon>
<!-- Axes -->
<line stroke="#333" x1="60" x2="900" y1="360" y2="360"></line>
<line stroke="#333" x1="60" x2="60" y1="40" y2="360"></line>
<!-- X grid + labels -->
<line stroke="#e5e7eb" stroke-width="0.7" x1="175" x2="175" y1="40" y2="360"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="290" x2="290" y1="40" y2="360"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="405" x2="405" y1="40" y2="360"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="520" x2="520" y1="40" y2="360"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="635" x2="635" y1="40" y2="360"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="750" x2="750" y1="40" y2="360"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="865" x2="865" y1="40" y2="360"></line>
<text fill="#555" font-size="10" text-anchor="middle" x="60" y="380">0</text>
<text fill="#555" font-size="10" text-anchor="middle" x="175" y="380">5</text>
<text fill="#555" font-size="10" text-anchor="middle" x="290" y="380">10</text>
<text fill="#555" font-size="10" text-anchor="middle" x="405" y="380">15</text>
<text fill="#555" font-size="10" text-anchor="middle" x="520" y="380">20</text>
<text fill="#555" font-size="10" text-anchor="middle" x="635" y="380">25</text>
<text fill="#555" font-size="10" text-anchor="middle" x="750" y="380">30</text>
<text fill="#555" font-size="10" text-anchor="middle" x="865" y="380">35</text>
<text fill="#333" font-size="11.5" font-weight="600" text-anchor="middle" x="480" y="402">peak compute (PFLOPs · FP8 dense)</text>
<!-- Y grid + labels -->
<line stroke="#e5e7eb" stroke-width="0.7" x1="60" x2="900" y1="299" y2="299"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="60" x2="900" y1="235" y2="235"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="60" x2="900" y1="171" y2="171"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="60" x2="900" y1="107" y2="107"></line>
<line stroke="#e5e7eb" stroke-width="0.7" x1="60" x2="900" y1="43" y2="43"></line>
<text fill="#555" font-size="10" text-anchor="end" x="50" y="363">0</text>
<text fill="#555" font-size="10" text-anchor="end" x="50" y="303">800</text>
<text fill="#555" font-size="10" text-anchor="end" x="50" y="239">1600</text>
<text fill="#555" font-size="10" text-anchor="end" x="50" y="175">2400</text>
<text fill="#555" font-size="10" text-anchor="end" x="50" y="111">3200</text>
<text fill="#555" font-size="10" text-anchor="end" x="50" y="47">4000</text>
<text fill="#333" font-size="11.5" font-weight="600" transform="rotate(-90 -110 200)" x="-110" y="200">NVLink BW (GB/s · per direction)</text>
<!-- Threshold line -->
<line stroke="#a33ea1" stroke-dasharray="6 4" stroke-width="2.2" x1="60" x2="612" y1="360" y2="40"></line>
<text fill="#a33ea1" font-size="12" font-weight="700" transform="rotate(-30 500 195)" x="500" y="195">阈值线 · C/B = 6144 FLOPs/B</text>
<!-- Region labels -->
<text fill="#1a3d1a" font-size="13" font-weight="700" x="160" y="115">✓ BW 余裕区</text>
<text fill="#1a3d1a" font-size="10.5" x="160" y="135">通信完全可藏 (compute-bound)</text>
<text fill="#7a2f2b" font-size="13" font-weight="700" x="690" y="305">⚠ BW 不足区</text>
<text fill="#7a2f2b" font-size="10.5" x="690" y="325">通信成瓶颈 (comm-bound)</text>
<!-- ===  4 GPU points only  === -->
<!-- 1) H100 / H200: 1.979P, 450 GB/s -->
<!-- x = 60 + (1.979/40)*920 = 105.5; y = 360 - (450/4000)*320 = 324 -->
<circle cx="106" cy="324" fill="#4a6fd3" r="9" stroke="#fff" stroke-width="2"></circle>
<text fill="#1a2d55" font-size="12" font-weight="700" x="120" y="316">H100 / H200</text>
<text fill="#1a2d55" font-size="10.5" x="120" y="332">1.98 PFLOPs · 450 GB/s · NVLink 4</text>
<text fill="#1a3d1a" font-size="11" font-weight="600" x="120" y="348">余量 1.36×</text>
<!-- 2) B200: 4.5P, 900 GB/s -->
<!-- x = 60 + (4.5/40)*920 = 163.5; y = 360 - (900/4000)*320 = 288 -->
<circle cx="164" cy="288" fill="#4a6fd3" r="9" stroke="#fff" stroke-width="2"></circle>
<text fill="#1a2d55" font-size="12" font-weight="700" x="178" y="262">B200</text>
<text fill="#1a2d55" font-size="10.5" x="178" y="278">4.5 PFLOPs · 900 GB/s · NVLink 5</text>
<text fill="#1a3d1a" font-size="11" font-weight="600" x="178" y="294">余量 1.20×</text>
<!-- 3) B300: SAME as B200 — overlap with yellow ring + arrow annotation -->
<circle cx="164" cy="288" fill="none" r="14" stroke="#e0b300" stroke-width="3"></circle>
<line stroke="#7a4e00" stroke-dasharray="3 2" stroke-width="1.5" x1="178" x2="200" y1="320" y2="350"></line>
<text fill="#7a4e00" font-size="11" font-weight="700" x="205" y="345">B300 与 B200 重合</text>
<text fill="#7a4e00" font-size="10" x="205" y="358">(同 FP8 4.5P / 同 900 GB/s)</text>
<text fill="#7a4e00" font-size="10" font-style="italic" x="205" y="370">B300 升级集中在 FP4 与 显存</text>
<!-- 4) Rubin Ultra: 35P, 3600 GB/s -->
<!-- x = 60 + (35/40)*920 = 865; y = 360 - (3600/4000)*320 = 72 -->
<circle cx="865" cy="72" fill="#b85450" r="11" stroke="#fff" stroke-width="2"></circle>
<text fill="#7a2f2b" font-size="12" font-weight="700" text-anchor="end" x="853" y="60">Rubin Ultra (next-next gen)</text>
<text fill="#7a2f2b" font-size="10.5" text-anchor="end" x="853" y="76">35 PFLOPs · 3600 GB/s · NVLink 7</text>
<text fill="#7a2f2b" font-size="11" font-weight="600" text-anchor="end" x="853" y="92">余量 0.62×（穿过阈值，BW 不足）</text>
<!-- Threshold required for Rubin Ultra -->
<line stroke="#a33ea1" stroke-dasharray="2 2" stroke-width="1.2" x1="865" x2="865" y1="72" y2="42"></line>
<circle cx="865" cy="42" fill="#a33ea1" r="4" stroke="#fff" stroke-width="1.5"></circle>
<text fill="#a33ea1" font-size="9.5" font-weight="600" text-anchor="end" x="853" y="38">阈值要求: 5833 GB/s</text>
<!-- Trajectory: H → B → Rubin -->
<polyline fill="none" points="106,324 164,288 865,72" stroke="#9ca3af" stroke-dasharray="4 3" stroke-width="1.4"></polyline>
<text fill="#6b7280" font-size="11" font-style="italic" transform="rotate(-22 500 180)" x="500" y="180">代际算力轨迹（同比例外推）</text>
</g>
<!-- Take-away -->
<rect fill="#f9fafb" height="92" rx="8" stroke="#e5e7eb" width="980" x="60" y="516"></rect>
<text fill="#333" font-size="11.5" x="80" y="536">• <b>H100/H200/B200/B300 都在 BW 余裕区</b>：V4-Pro MoE 的通信可以完全藏在计算之下，NVLink 不是瓶颈。</text>
<text fill="#333" font-size="11.5" x="80" y="554">• <b>B200 与 B300 在本图上是同一个点</b>（FP8 4.5P / NVLink 900 GB/s 都不变）；B300 升级在 FP4 (+50%) 与 HBM (180→288 GB)，对 V4 MoE 的 C/B 故事不变。</text>
<text fill="#333" font-size="11.5" x="80" y="572">• <b>Rubin Ultra（next-next gen）首次穿过紫色阈值线</b>：FP8 涨 7.8×（4.5 → 35P）但 NVLink 只涨 4×（900 → 3600 GB/s）→ 余量从 1.20× 跌到 0.62×。</text>
<text fill="#333" font-size="11.5" x="80" y="590">• 论文 §3.1.2 ① 真正预言的时刻：<b>「单卡 compute 增速 ≫ NVLink 增速」</b>，从 Rubin 代起按 C/B 阈值重新平衡硬件设计成为必需。</text>
</svg>