<svg viewbox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fff" height="300" width="1000"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="500" y="24">Muon Optimizer · hybrid Newton-Schulz orthogonalization (paper Algorithm 1)</text>
<g transform="translate(40,52)"><rect fill="#eef3ff" height="60" rx="4" stroke="#4a6fd3" width="200" x="0" y="0"></rect><text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="100" y="24">① Grad + momentum</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="100" y="42">G_t = ∇L</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="100" y="56">M_t = μM_{t-1} + G_t</text></g>
<g transform="translate(260,52)"><rect fill="#fff5f0" height="60" rx="4" stroke="#b85450" width="220" x="0" y="0"></rect><text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="110" y="24">② Nesterov look-ahead</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="110" y="42">M̄ = μM_t + G_t</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="110" y="56">O′ = HybridNS(M̄)</text></g>
<g transform="translate(500,52)"><rect fill="#fff8e7" height="60" rx="4" stroke="#e0b300" width="460" x="0" y="0"></rect><text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="230" y="20">③ Hybrid Newton-Schulz 10 steps (BF16 matmul)</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="230" y="38">8 steps (a,b,c) = (3.4445, -4.7750, 2.0315) — aggressive, σ → 1</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="230" y="54">2 steps (a,b,c) = (2, -1.5, 0.5) — stabilize σ at 1</text></g>
<g transform="translate(40,140)"><rect fill="#f4faf4" height="60" rx="4" stroke="#5fa55f" width="460" x="0" y="0"></rect><text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="230" y="20">④ RMS rescale (reuse AdamW LR)</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="230" y="38">O_t = O′ · √max(n,m) · γ</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="230" y="54">γ = 0.18</text></g>
<g transform="translate(520,140)"><rect fill="#f9eef8" height="60" rx="4" stroke="#a33ea1" width="440" x="0" y="0"></rect><text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="220" y="20">⑤ Weight decay + update</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="220" y="38">W_t = W_{t-1} · (1 - ηλ) - ηO_t</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="220" y="54">μ=0.95, λ=0.1</text></g>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="500" y="240">Hybrid-ZeRO strategy</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="500" y="258">dense: knapsack bucket + reduce-scatter padding (≤10% memory overhead)</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="500" y="275">MoE: flatten per-expert, BF16 stochastic rounding + two-stage all-to-all + local FP32 sum</text>
</svg>