<svg viewBox="0 0 1000 350" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
  <style>
    .title{font:700 24px sans-serif;fill:#24292f}
    .sub{font:400 13px sans-serif;fill:#57606a}
    .mono{font:500 13px ui-monospace,Menlo,monospace;fill:#24292f}
  </style>
</defs>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">grid_sync without counter reset</text>
<rect x="110" y="96" width="780" height="54" rx="8" fill="#f6f8fa" stroke="#57606a" stroke-width="2"/>
<text x="500" y="130" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#24292f">int32 counter = [ phase bit | arrival count ]</text>
<rect x="145" y="196" width="180" height="70" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="235" y="224" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#4a6fd3">round 0</text>
<text x="235" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#24292f">phase=0</text>
<rect x="410" y="196" width="180" height="70" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="500" y="224" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#5fa55f">arrivals=N</text>
<text x="500" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#24292f">flip bit31</text>
<rect x="675" y="196" width="180" height="70" rx="8" fill="#fbf0fb" stroke="#a33ea1" stroke-width="2"/>
<text x="765" y="224" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#a33ea1">round 1</text>
<text x="765" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#24292f">phase=1</text>
<line x1="325" y1="231" x2="410" y2="231" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="590" y1="231" x2="675" y2="231" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<text x="500" y="316" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">No reset step: the phase bit distinguishes old arrivals from the next round.</text>
</svg>
