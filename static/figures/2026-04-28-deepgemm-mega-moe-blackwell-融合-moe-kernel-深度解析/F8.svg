<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
  <style>
    .title{font:700 24px sans-serif;fill:#24292f}
    .sub{font:400 13px sans-serif;fill:#57606a}
    .mono{font:500 13px ui-monospace,Menlo,monospace;fill:#24292f}
  </style>
</defs>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">Symmetric memory turns EP dispatch into remote loads</text>
<rect x="70" y="118" width="230" height="145" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="185" y="150" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#5fa55f">target rank</text>
<text x="185" y="178" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#24292f">local experts</text>
<text x="185" y="206" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">reads count table</text>
<text x="185" y="232" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">pulls remote X</text>
<rect x="390" y="96" width="160" height="56" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="470" y="130" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="14" font-weight="700" fill="#e0b300">count[e,r]</text>
<rect x="650" y="84" width="250" height="84" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="775" y="116" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#4a6fd3">rank r buffer</text>
<text x="775" y="142" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">X, Xsf, topk</text>
<rect x="650" y="216" width="250" height="84" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="775" y="248" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#4a6fd3">rank q buffer</text>
<text x="775" y="274" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">same offsets</text>
<line x1="300" y1="176" x2="390" y2="124" stroke="#5fa55f" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="550" y1="124" x2="650" y2="126" stroke="#e0b300" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="650" y1="258" x2="300" y2="222" stroke="#4a6fd3" stroke-width="2" marker-end="url(#arrow)"/>
<text x="500" y="336" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">symmetric address = base[rank] + offset; pull avoids fine-grained push notification.</text>
</svg>
