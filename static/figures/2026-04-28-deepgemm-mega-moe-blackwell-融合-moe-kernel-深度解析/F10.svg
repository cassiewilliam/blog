<svg viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
  <style>
    .title{font:700 24px sans-serif;fill:#24292f}
    .sub{font:400 13px sans-serif;fill:#57606a}
    .mono{font:500 13px ui-monospace,Menlo,monospace;fill:#24292f}
  </style>
</defs>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">mbarrier phase-bit reuse</text>
<rect x="95" y="100" width="240" height="70" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="215" y="128" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#4a6fd3">phase = 0</text>
<text x="215" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">producer fills slot</text>
<rect x="380" y="100" width="240" height="70" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="500" y="128" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#5fa55f">arrive complete</text>
<text x="500" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">phase flips</text>
<rect x="665" y="100" width="240" height="70" rx="8" fill="#fbf0fb" stroke="#a33ea1" stroke-width="2"/>
<text x="785" y="128" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#a33ea1">wait(0) returns</text>
<text x="785" y="152" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">consumer owns data</text>
<line x1="335" y1="135" x2="380" y2="135" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="620" y1="135" x2="665" y2="135" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<path d="M785 172 C760 220, 235 220, 215 172" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="7 6"/>
<text x="500" y="246" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">The same slot can be reused because the phase disambiguates old and new rounds.</text>
</svg>
