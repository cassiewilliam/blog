<svg viewbox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="ps_ar" markerheight="7" markerwidth="7" orient="auto" refx="10" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#333"></path></marker></defs>
<rect fill="#fff" height="620" width="1100"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="550" y="24">Prefill · tensor-shape propagation (one chunk, V4-Pro, compress_ratio=4, top_k=1024)</text>
<text fill="#555" font-family="monospace" font-size="11" text-anchor="middle" x="550" y="42">let Tp = prefill tokens in this chunk · Sp = max(prefill_seq_len) · N = ⌈max_model_len/m⌉ ≈ 262144</text>
<!-- Lane header -->
<text fill="#b85450" font-family="sans-serif" font-size="12" font-weight="700" x="60" y="70">Q / Indexer lane</text>
<text fill="#4a6fd3" font-family="sans-serif" font-size="12" font-weight="700" x="420" y="70">KV / Compressor lane</text>
<text fill="#5fa55f" font-family="sans-serif" font-size="12" font-weight="700" x="800" y="70">Cache / Metadata</text>
<!-- Row 1 -->
<rect fill="#fff5f0" height="60" rx="4" stroke="#b85450" width="350" x="30" y="80"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="205" y="100">qr after Q LoRA</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="205" y="118">[Tp, 1536] bf16</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="205" y="134">produced by fused_wqa_wkv @ Layer 7.2 ②</text>
<rect fill="#eef3ff" height="60" rx="4" stroke="#4a6fd3" width="350" x="400" y="80"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="575" y="100">kv latent</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="575" y="118">[Tp, 576] = [Tp, kv_lora=512 + rope=64]</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="575" y="134">same GEMM as qr</text>
<rect fill="#f4faf4" height="60" rx="4" stroke="#5fa55f" width="300" x="770" y="80"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="920" y="100">topk_indices_buffer (shared)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="118">[max_batched_tokens, 1024] int32</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="920" y="134">allocated once in DeepseekV4Model</text>
<!-- Row 2 -->
<rect fill="#fff5f0" height="72" rx="4" stroke="#b85450" width="350" x="30" y="160"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="205" y="180">fused_q_kv_rmsnorm + wq_b</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="205" y="198">qr (norm) → wq_b → q</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="205" y="215">q : [Tp, n_h=128, head_dim=576]</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="205" y="228">bf16 · before fused qnorm+RoPE</text>
<rect fill="#eef3ff" height="72" rx="4" stroke="#4a6fd3" width="350" x="400" y="160"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="575" y="180">DeepseekCompressor (aux stream)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="575" y="198">hidden → C_a,C_b ∈ [Tp, c=512]</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="575" y="213">Z_a,Z_b ∈ [Tp, c]  softmax wts</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="575" y="228">→ compressed K in DeepseekV4IndexerCache</text>
<rect fill="#f4faf4" height="72" rx="4" stroke="#5fa55f" width="300" x="770" y="160"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="920" y="180">CompressorStateCache</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="198">[num_blocks, 4, 2*c]   (C4A)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="215">[num_blocks, 8, 2*c]   (C128A)</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="920" y="228">float32 KV state + score state</text>
<!-- Row 3: fused qnorm+RoPE+insert -->
<rect fill="#f9eef8" height="72" rx="4" stroke="#a33ea1" width="720" x="30" y="252"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="390" y="274">fused_deepseek_v4_qnorm_rope_kv_rope_quant_insert()  — single CUDA kernel</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="390" y="293">q in/out : [Tp, 128, 576]   ·   kv read-only : [Tp, 576]</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="390" y="309">writes SWA cache @ slot_mapping : [Tp] int64 → bytes in swa_kv_cache[num_blocks, 64 * 584]</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="390" y="323">per-head RMSNorm (no wt) · GPT-J RoPE last 64 · UE8M0 FP8 quant · paged insert</text>
<rect fill="#f4faf4" height="72" rx="4" stroke="#5fa55f" width="300" x="770" y="252"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="920" y="272">DeepseekV4SWACache</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="290">[num_blocks, 64 · 584] uint8</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="920" y="306">584 = 448 NoPE FP8 + 128 RoPE BF16</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="920" y="320">+ 8 UE8M0 scales (per token)</text>
<!-- Row 4: indexer -->
<rect fill="#fff5f0" height="84" rx="4" stroke="#b85450" width="720" x="30" y="344"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="390" y="365">SparseAttnIndexer.forward()  — deep_gemm.fp8_mqa_logits + TileLang top-k</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="390" y="385">q_I      : [Tp, n_h^I=64, c_I=128] (FP4)          K_I : paged compressed (FP4)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="390" y="401">w_I      : [Tp, 64] bf16                           ks/ke: [Tp] int64 (causal bounds)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="390" y="417">logits   : (Tp, n_I, 64) → fused → topk_indices_buffer[Tp, 1024] int32</text>
<rect fill="#f4faf4" height="84" rx="4" stroke="#5fa55f" width="300" x="770" y="344"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="920" y="364">DeepseekV4IndexerCache</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="382">FP8 path : [B, 64, 128]</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="398">FP4 path : [B, 64, 64] packed + scales</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="920" y="414">indexed via block_table (shared)</text>
<!-- Row 5: gather -->
<rect fill="#eef7ee" height="72" rx="4" stroke="#5fa55f" width="720" x="30" y="448"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="390" y="468">dequantize_and_gather_k_cache  (compressed) + (SWA with offset=N)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="390" y="486">workspace kv : [PREFILL_CHUNK_SIZE=4, M, 576] bf16   ·   M = N + n_win + max_batched</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="390" y="503">per chunk writes kv[:chunk] at offset 0 (compressed) and offset N (SWA window)</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="390" y="518">reserved once at profile time; reused across chunks</text>
<rect fill="#f4faf4" height="72" rx="4" stroke="#5fa55f" width="300" x="770" y="448"></rect>
<text font-family="sans-serif" font-size="11.5" font-weight="700" text-anchor="middle" x="920" y="470">combine_topk_swa_indices</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="488">combined_indices : [Tq, K] int32</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="920" y="504">combined_lens    : [Tq]    int32</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="920" y="518">K = top_k + n_win, causal-masked</text>
<!-- Row 6: flash_mla_sparse_fwd -->
<rect fill="#f4faf4" height="70" rx="4" stroke="#5fa55f" stroke-width="2" width="1040" x="30" y="540"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="550" y="562">flash_mla_sparse_fwd(q=[Tq, 128, 576], kv=[-1, 1, 576], indices=[Tq, 1, K], sm_scale, attn_sink, topk_length=[Tq], out=[Tq, 128, 576])</text>
<text font-family="monospace" font-size="11" text-anchor="middle" x="550" y="582">sparse over top-k ∪ window · FP8 KV · partial RoPE(64) · writes out in bf16</text>
<text fill="#555" font-family="monospace" font-size="10.5" text-anchor="middle" x="550" y="598">kv.view(-1, 1, 576) flattens the [PREFILL_CHUNK, M, 576] workspace into a kernel-friendly (M·CHUNK, 1, 576) layout</text>
<line marker-end="url(#ps_ar)" stroke="#333" x1="205" x2="205" y1="140" y2="158"></line>
<line marker-end="url(#ps_ar)" stroke="#333" x1="575" x2="575" y1="140" y2="158"></line>
<line marker-end="url(#ps_ar)" stroke="#333" x1="390" x2="390" y1="232" y2="250"></line>
<line marker-end="url(#ps_ar)" stroke="#333" x1="390" x2="390" y1="324" y2="342"></line>
<line marker-end="url(#ps_ar)" stroke="#333" x1="390" x2="390" y1="428" y2="446"></line>
<line marker-end="url(#ps_ar)" stroke="#333" x1="550" x2="550" y1="520" y2="538"></line>
</svg>