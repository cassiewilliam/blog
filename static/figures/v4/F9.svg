<svg viewbox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fff" height="420" width="1000"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="500" y="24">Heterogeneous KV Cache layout (paper Figure 6)</text>
<rect fill="#f6f8fa" height="326" rx="4" stroke="#555" width="260" x="30" y="54"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="160" y="74">State Cache pool</text>
<text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="160" y="92">pre-allocated fixed-size</text>
<g transform="translate(50,108)">
<rect fill="#eef3ff" height="36" stroke="#4a6fd3" width="220" x="0" y="0"></rect><text font-family="sans-serif" font-size="10" text-anchor="middle" x="110" y="15">Request 1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="110" y="30">SWA KV | Uncompressed tail</text>
<rect fill="#eef3ff" height="36" stroke="#4a6fd3" width="220" x="0" y="42"></rect><text font-family="sans-serif" font-size="10" text-anchor="middle" x="110" y="57">Request 2</text><text font-family="monospace" font-size="10" text-anchor="middle" x="110" y="72">SWA KV | Uncompressed tail</text>
<rect fill="#eef3ff" height="36" stroke="#4a6fd3" stroke-dasharray="3 2" width="220" x="0" y="84"></rect><text font-family="sans-serif" font-size="10" text-anchor="middle" x="110" y="99">…</text>
<rect fill="#eef3ff" height="36" stroke="#4a6fd3" width="220" x="0" y="126"></rect><text font-family="sans-serif" font-size="10" text-anchor="middle" x="110" y="141">Request R</text><text font-family="monospace" font-size="10" text-anchor="middle" x="110" y="156">SWA KV | Uncompressed tail</text>
</g>
<text fill="#1a3a5c" font-family="sans-serif" font-size="11" text-anchor="middle" x="160" y="300">≈ state-space model: KV depends only on current pos</text>
<text fill="#1a3a5c" font-family="sans-serif" font-size="11" text-anchor="middle" x="160" y="320">does not fit PagedAttention's uniform paging,</text>
<text fill="#1a3a5c" font-family="sans-serif" font-size="11" text-anchor="middle" x="160" y="338">dedicated pre-allocated pool avoids fragmentation</text>
<rect fill="#f6f8fa" height="326" rx="4" stroke="#555" width="640" x="320" y="54"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="640" y="74">Classical Paged KV Cache</text>
<text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="640" y="92">each block covers lcm(m, m') = 128 original tokens → k1 = 32 CSA, k2 = 1 HCA</text>
<g transform="translate(340,108)">
<rect fill="#fff5f0" height="80" stroke="#b85450" width="140" x="0" y="0"></rect><text font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" x="70" y="20">Block 0</text><text font-family="monospace" font-size="10" text-anchor="middle" x="70" y="38">CSA Indexer KV · k1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="70" y="54">CSA Main KV · k1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="70" y="70">HCA KV · k2</text>
<rect fill="#fff5f0" height="80" stroke="#b85450" width="140" x="150" y="0"></rect><text font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" x="220" y="20">Block 1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="220" y="38">CSA Indexer KV · k1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="220" y="54">CSA Main KV · k1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="220" y="70">HCA KV · k2</text>
<rect fill="#fff5f0" height="80" stroke="#b85450" stroke-dasharray="3 2" width="140" x="300" y="0"></rect><text font-family="monospace" font-size="11" text-anchor="middle" x="370" y="40">…</text>
<rect fill="#fff5f0" height="80" stroke="#b85450" width="140" x="450" y="0"></rect><text font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle" x="520" y="20">Block N</text><text font-family="monospace" font-size="10" text-anchor="middle" x="520" y="38">CSA Indexer KV · k1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="520" y="54">CSA Main KV · k1</text><text font-family="monospace" font-size="10" text-anchor="middle" x="520" y="70">HCA KV · k2</text>
</g>
<g transform="translate(340,210)">
<rect fill="#fff" height="150" stroke="#d0d7de" stroke-dasharray="2 2" width="600" x="0" y="0"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="300" y="20">vLLM (branch aip/0.16.0) mapping</text>
<text font-family="monospace" font-size="10.5" x="20" y="40">DeepseekV4SWACache    (block=64, fp8_ds_mla, 584 B/token)</text>
<text font-family="monospace" font-size="10.5" x="20" y="56">DeepseekV4IndexerCache (block=64, FP8 UE8M0, compressor K only)</text>
<text font-family="monospace" font-size="10.5" x="20" y="72">CompressorStateCache  (block=4 C4A / 8 C128A, float32 KV+score)</text>
<text fill="#555" font-family="sans-serif" font-size="10.5" x="20" y="92">• per-token 584 B = 448 NoPE FP8 + 128 RoPE BF16 + 8 UE8M0 scales</text>
<text fill="#555" font-family="sans-serif" font-size="10.5" x="20" y="108">• compress_ratio ∈ {1, 4, 128} decides whether indexer / compressor runs</text>
<text fill="#555" font-family="sans-serif" font-size="10.5" x="20" y="124">• block_size is a multiple of lcm(m, m') for kernel alignment</text>
<text fill="#555" font-family="sans-serif" font-size="10.5" x="20" y="140">• PagedAttention only for classical cache; SWA+tail lives in the state pool</text>
</g>
</svg>