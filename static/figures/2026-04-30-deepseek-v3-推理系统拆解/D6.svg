<svg viewBox="0 0 1000 295" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="#1f3a6f">Decode 单步时序（DBO 开启）</text>

<g font-family="sans-serif" font-size="11">
  <rect x="50" y="60" width="900" height="50" fill="#eef3ff" stroke="#4a6fd3"/>
  <text x="25" y="90" font-weight="700" fill="#1f3a6f">Compute</text>

  <rect x="60"  y="70" width="80"  height="32" fill="#a7bce0"/><text x="100" y="92" text-anchor="middle" font-size="10">MLA0</text>
  <rect x="140" y="70" width="80"  height="32" fill="#a7bce0"/><text x="180" y="92" text-anchor="middle" font-size="10">MLA1</text>
  <rect x="230" y="70" width="70"  height="32" fill="#e0b300"/><text x="265" y="92" text-anchor="middle" font-size="10">Gate0</text>
  <rect x="305" y="70" width="70"  height="32" fill="#e0b300"/><text x="340" y="92" text-anchor="middle" font-size="10">Gate1</text>
  <rect x="395" y="70" width="160" height="32" fill="#5fa55f"/><text x="475" y="92" text-anchor="middle" fill="#fff" font-size="11">MB0 Masked GEMM</text>
  <rect x="560" y="70" width="160" height="32" fill="#5fa55f"/><text x="640" y="92" text-anchor="middle" fill="#fff" font-size="11">MB1 Masked GEMM</text>
  <rect x="725" y="70" width="120" height="32" fill="#a7bce0"/><text x="785" y="92" text-anchor="middle" font-size="10">Shared MLP</text>

  <rect x="50" y="130" width="900" height="50" fill="#fff5f0" stroke="#b85450"/>
  <text x="25" y="160" font-weight="700" fill="#4a1515">Comm</text>

  <rect x="230" y="140" width="150" height="32" fill="#e89a94"/><text x="305" y="162" text-anchor="middle" fill="#fff">MB0 LL Disp</text>
  <rect x="385" y="140" width="150" height="32" fill="#e89a94"/><text x="460" y="162" text-anchor="middle" fill="#fff">MB1 LL Disp</text>
  <rect x="555" y="140" width="165" height="32" fill="#b85450"/><text x="637" y="162" text-anchor="middle" fill="#fff">MB0 LL Combine</text>
  <rect x="725" y="140" width="165" height="32" fill="#b85450"/><text x="807" y="162" text-anchor="middle" fill="#fff">MB1 LL Combine</text>
</g>

<g font-family="sans-serif" font-size="11" fill="#333">
  <text x="60"  y="215" text-anchor="start">• LL Dispatch/Combine 延迟总和 ~1-2 ms（RDMA 64 QP 并发 + 0 SM）</text>
  <text x="60"  y="233" text-anchor="start">• Masked GEMM 每层 ~0.5-0.8 ms，与 Combine 几乎完全重叠</text>
  <text x="60"  y="251" text-anchor="start">• Shared MLP 独立 aux stream，藏在 Combine drain 里</text>
  <text x="60"  y="269" text-anchor="start">• CUDA Graph 把上述 stream 调度一次录制，replay 时 ~微秒级 launch</text>
</g>
</svg>