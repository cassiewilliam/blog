<svg viewBox="0 0 1000 405" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="405" fill="#ffffff"/>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">BP.pdf neuron rule: local slope times downstream adjoint</text>
<text x="500" y="64" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">the two-pass algorithm behind every later matrix formula</text>
<rect x="55" y="112" width="230" height="98" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="170" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">forward side</text>
<text x="170" y="166" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" font-style="italic" font-weight="700" fill="#57606a">z = Σ<tspan baseline-shift="-25%" font-size="10.5">i</tspan> a<tspan baseline-shift="-25%" font-size="10.5">i</tspan>w<tspan baseline-shift="-25%" font-size="10.5">i</tspan> + b</text>
<text x="170" y="191" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" font-style="italic" font-weight="700" fill="#a33ea1">∂z/∂w<tspan baseline-shift="-25%" font-size="10.5">i</tspan> = a<tspan baseline-shift="-25%" font-size="10.5">i</tspan></text>
<line x1="287" y1="161" x2="384" y2="161" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="384" y="112" width="232" height="98" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="500" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">activation cache</text>
<text x="500" y="166" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" font-style="italic" font-weight="700" fill="#57606a">a = σ(z)</text>
<text x="500" y="191" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="700" fill="#a33ea1">save z or a for σ′(z)</text>
<line x1="618" y1="161" x2="715" y2="161" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="715" y="112" width="230" height="98" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="830" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">backward side</text>
<text x="830" y="164" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="13" font-style="italic" font-weight="700" fill="#57606a">r = Σ<tspan baseline-shift="-25%" font-size="9.1">j</tspan> w<tspan baseline-shift="-25%" font-size="9.1">j</tspan> Δ<tspan baseline-shift="-25%" font-size="9.1">j</tspan><tspan baseline-shift="38%" font-size="9.1">next</tspan></text>
<text x="830" y="188" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="700" fill="#a33ea1">Δ<tspan baseline-shift="-25%" font-size="9.8">z</tspan> = σ′(z) · r</text>
<rect x="115" y="285" width="770" height="78" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
<text x="500" y="314" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="17" font-style="italic" font-weight="700" fill="#a33ea1">∂L/∂w<tspan baseline-shift="-25%" font-size="11.9">i</tspan> = (∂z/∂w<tspan baseline-shift="-25%" font-size="11.9">i</tspan>) · Δ<tspan baseline-shift="-25%" font-size="11.9">z</tspan> = a<tspan baseline-shift="-25%" font-size="11.9">i</tspan>Δ<tspan baseline-shift="-25%" font-size="11.9">z</tspan></text>
<text x="500" y="342" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" fill="#57606a">forward gives local slopes; backward gives the global error signal</text>
</svg>
