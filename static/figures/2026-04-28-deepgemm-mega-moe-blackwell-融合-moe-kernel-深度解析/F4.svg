<text x="500" y="204" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="400" fill="#24292f">operand: SMEM</text>
<line x1="620" y1="170" x2="675" y2="170" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="685" y="96" width="220" height="150" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
