baseURL = "https://cassiewilliam.github.io/blog/"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"
title = "Yang Min 的技术博客"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
pygmentsUseClasses = true
enableInlineShortcodes = true

[params]
  env = "production"
  description = "GPU / CUDA / LLM 系统优化 · 长上下文推理 · MoE 内核工程"
  author = "Min Yang"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false
  DateFormat = "2006-01-02"
  comments = true                       # show Giscus on posts
  busuanzi = true
  signature = "知识的终点不是占有，而是判断；<br>学习的终点不是理解，而是决策。"
                       # show 不蒜子 PV/UV counter site-wide
  math = false                          # per-post can override via frontmatter math: true
  drawio = false                        # per-post override

# 首页 profile 模式（左侧头像 + 简介 + 社交图标，比纯文章列表更像个人站）
[params.profileMode]
  enabled = true
  title = "Yang Min"
  subtitle = "AI Infra  /  LLM 推理系统  /  大规模 LLM 训练优化  /  通算融合  /  CUDA with Hopper & Blackwell GPU"
  imageUrl = "https://cassiewilliam.github.io/blog/profile-avatar.png"
  imageTitle = "avatar"
  imageWidth = 140
  imageHeight = 140
  buttons = [
    { name = "归档", url = "https://cassiewilliam.github.io/blog/archives/" },
    { name = "标签", url = "https://cassiewilliam.github.io/blog/tags/" },
    { name = "关于", url = "https://cassiewilliam.github.io/blog/about/" },
  ]

# 社交链接（在 profile 下方/页脚展示）
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/cassiewilliam"
[[params.socialIcons]]
  name = "zhihu"
  url = "https://www.zhihu.com/people/yang-min-64-15"
[[params.socialIcons]]
  name = "email"
  url = "mailto:2016202110015@whu.edu.cn"   # ✏️ 改成你的邮箱

# Giscus 评论配置 (params.giscus)
# - 你需要先在 GitHub 仓库 Settings → Features 勾选 Discussions
# - 然后到 https://giscus.app/ 配置一遍，把生成的 6 个值填进来
[params.giscus]
  repo = "cassiewilliam/blog"
  repoID = "R_kgDOSOl71A"
  category = "Announcements"
  categoryID = "DIC_kwDOSOl71M4C73A_"
  mapping = "pathname"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "bottom"
  theme = "preferred_color_scheme"
  lang = "zh-CN"
  loading = "lazy"

# drawio GitHub direct-edit (used by {{< drawio >}} shortcode)
drawioGithubRepo = "cassiewilliam/blog"
drawioGithubBranch = "main"

[params.homeInfoParams]
  Title = "Yang Min 的技术博客"
  Content = "自动化生成的分析报告。"

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "https://cassiewilliam.github.io/blog/archives/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "https://cassiewilliam.github.io/blog/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "https://cassiewilliam.github.io/blog/about/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["\\[", "\\]"], ["$$", "$$"]]
      inline = [["\\(", "\\)"], ["$",  "$"]]


  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[params.footer]
  text = "本站文章多由 <a href=\"https://claude.com/claude-code\" target=\"_blank\" rel=\"noopener\">Claude Code</a> 协作完成 · 用于梳理技术思路与实现细节 · 作者审校定稿，对内容负责。"

