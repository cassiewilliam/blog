<svg viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="#1a3d1a">DeepGEMM Masked Layout: (E, max_m, K) 3D tensor</text>
<g font-family="monospace" font-size="11">
  <!-- expert slab -->
  <g>
    <rect x="60"  y="60" width="860" height="50" fill="#d5e8d4" stroke="#5fa55f"/>
    <text x="490" y="80" text-anchor="middle" font-weight="700" fill="#1a3d1a">Expert 0 (max_m=256)</text>
    <rect x="60"  y="92" width="200" height="14" fill="#a8d89a"/>
    <rect x="260" y="92" width="660" height="14" fill="#f8cecc" opacity="0.55"/>
    <text x="150" y="103" text-anchor="middle" font-size="10" fill="#0f3d0f">real=58</text>
    <text x="580" y="103" text-anchor="middle" font-size="10" fill="#4a1515">mask (跳过 198 行)</text>

    <rect x="60"  y="120" width="860" height="50" fill="#d5e8d4" stroke="#5fa55f"/>
    <text x="490" y="140" text-anchor="middle" font-weight="700" fill="#1a3d1a">Expert 1</text>
    <rect x="60"  y="152" width="350" height="14" fill="#a8d89a"/>
    <rect x="410" y="152" width="510" height="14" fill="#f8cecc" opacity="0.55"/>
    <text x="235" y="163" text-anchor="middle" font-size="10" fill="#0f3d0f">real=108</text>
    <text x="660" y="163" text-anchor="middle" font-size="10" fill="#4a1515">mask</text>

    <rect x="60"  y="180" width="860" height="50" fill="#d5e8d4" stroke="#5fa55f"/>
    <text x="490" y="200" text-anchor="middle" font-weight="700" fill="#1a3d1a">Expert 2</text>
    <rect x="60"  y="212" width="0"   height="14" fill="#a8d89a"/>
    <rect x="60"  y="212" width="860" height="14" fill="#f8cecc" opacity="0.55"/>
    <text x="490" y="223" text-anchor="middle" font-size="10" fill="#4a1515">real=0 → 整 expert mask（kernel 直接跳整组）</text>
  </g>

  <text x="490" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">→ expert_num_tokens[E] 一个向量，kernel 内按向量比较而非读每行 m_indices</text>
  <text x="490" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">→ 所有 expert 的 GEMM 维度固定，CUDA Graph 可一次录制重复执行</text>
  <text x="490" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">→ 代价：padding 比例大（但 Decode 本来 batch 就小，空间可接受）</text>
</g>
</svg>