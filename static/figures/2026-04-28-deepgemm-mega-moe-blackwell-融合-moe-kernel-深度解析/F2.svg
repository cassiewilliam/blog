<text x="320" y="189" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">UMMA multicast</text>
<line x1="403" y1="160" x2="425" y2="160" stroke="#5fa55f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="431" y="112" width="154" height="96" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="508" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#24292f">CTA</text>
<text x="508" y="172" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">512 thr</text>
<text x="508" y="189" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">SMEM + mbarrier</text>
<line x1="591" y1="160" x2="613" y2="160" stroke="#e0b300" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="619" y="112" width="154" height="96" rx="8" fill="#fbf0fb" stroke="#a33ea1" stroke-width="2"/>
<text x="696" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#24292f">Warpgroup</text>
<text x="696" y="172" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">128 thr</text>
<text x="696" y="189" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">UMMA / epilogue</text>
<line x1="779" y1="160" x2="801" y2="160" stroke="#a33ea1" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="807" y="112" width="154" height="96" rx="8" fill="#f6f8fa" stroke="#57606a" stroke-width="2"/>
<text x="884" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#24292f">Warp</text>
<text x="884" y="172" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">role split</text>
<text x="884" y="189" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">D / TMA / EPI</text>
<text x="500" y="245" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#57606a">A single optimization point is not enough: overlap needs hierarchy + memory + sync together.</text>
