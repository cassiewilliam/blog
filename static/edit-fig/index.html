<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Edit · drawio</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:-apple-system,Segoe UI,PingFang SC,sans-serif;color:#1f2328}
  #bar{position:fixed;top:0;left:0;right:0;height:38px;display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid #d0d7de;background:#f6f8fa;font-size:13px;z-index:10;box-sizing:border-box}
  #bar code{font-family:ui-monospace,Menlo,monospace;color:#57606b}
  #bar .s{color:#57606b}
  #bar .ok{color:#1f883d;font-weight:600}
  #bar .err{color:#cf222e}
  #f{position:fixed;top:38px;left:0;right:0;bottom:0;width:100%;height:calc(100vh - 38px);border:0;display:block;background:#fff}
  .pane{max-width:540px;margin:80px auto;padding:0 20px}
  .pane a{color:#0969da}
</style>
</head>
<body>
<div id="bar"><strong>drawio</strong> <code id="src">…</code> <span class="s" id="st">loading…</span></div>
<iframe id="f" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>

<script>
const qs   = new URLSearchParams(location.search);
const src  = qs.get('src');
if (!src) {
  document.body.innerHTML = '<div class="pane"><h2>缺少 ?src 参数</h2></div>';
  throw 0;
}
document.getElementById('src').textContent = src;
const st = document.getElementById('st');
const setStat = (t,c) => { st.textContent = t; st.className = c || 's'; };

let drawioPath = null;
if (/^\/drawio\/.+\.drawio$/i.test(src)) {
  drawioPath = src;
} else if (/\.svg$/i.test(src)) {
  drawioPath = src
    .replace(/^\/figures\//, '/drawio/')
    .replace(/\/([^/]+)\.svg$/i, '/figures/$1.drawio');
} else {
  const assetHref = src.startsWith('/') ? src : '/' + src;
  document.body.innerHTML =
    '<div class="pane"><h2>这张图没有 draw.io 源文件</h2>' +
    '<p><code>' + src.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])) + '</code> 是 PNG/JPG 等 raster 图，不能直接进入 draw.io 编辑器。</p>' +
    '<p><a href="' + assetHref + '">打开原图</a></p></div>';
  throw 0;
}

function readPAT() {
  for (const k of ['netlify-cms-user','decap-cms-user','netlify-cms.user','decap-cms.user']) {
    const v = localStorage.getItem(k);
    if (!v) continue;
    try { const u = JSON.parse(v); if (u && u.token) return u.token; } catch (e) {}
  }
  return null;
}
const token = readPAT();
if (!token) {
  document.body.innerHTML = '<div class="pane"><h2>需要先登录</h2><p>编辑器复用 Decap CMS 的 GitHub PAT。请先去 <a href="/admin/">/admin/</a> 用 PAT 登录一次（一次性），再回到这页。</p></div>';
  throw 0;
}

const iframe = document.getElementById('f');
let drawioXML = null;
let saving = false;

fetch(drawioPath + '?_=' + Date.now())
  .then(r => r.ok ? r.text() : Promise.reject(`fetch ${drawioPath} → ${r.status}`))
  .then(t => {
    drawioXML = t;
    setStat('XML 已读取，启动 drawio…');
    // embed=1: postMessage protocol
    // proto=json: JSON-format messages
    // ui=min: minimal UI (avoids the 'atlas' theme rendering issues we saw)
    // spin=0: no loading overlay before init
    // saveAndExit=0: stay in editor after save
    // noSaveBtn=0: keep the Save button (it triggers our save handler)
    iframe.src = 'https://embed.diagrams.net/?embed=1&proto=json&ui=min&spin=0&saveAndExit=0&noSaveBtn=0';
  })
  .catch(e => setStat('加载失败: ' + e, 'err'));

window.addEventListener('message', e => {
  let m;
  try { m = JSON.parse(e.data); } catch (_) { return; }
  if (!m || !m.event) return;
  const post = obj => iframe.contentWindow.postMessage(JSON.stringify(obj), '*');

  if (m.event === 'init') {
    post({ action: 'load', xml: drawioXML, autosave: 0 });
    // After load, fit the diagram to the viewport so the canvas isn't blank.
    setTimeout(() => post({ action: 'status', message: '' }), 200);
    setStat('drawio 就绪 · 编辑后 ⌘S 保存', 'ok');
  }
  else if (m.event === 'save' && !saving) {
    // m.xml is the new mxfile XML (drawio's native format). Save it back to
    // the .drawio companion path — the live page renders that file via the
    // mxgraph viewer, so the editor view and the page view always match.
    saving = true;
    setStat('提交到 GitHub…');
    const xml = m.xml || '';
    fetch('/oauth/save-fig', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        token, repo: 'cassiewilliam/blog', branch: 'main',
        path: 'static' + drawioPath,
        content: xml,
        message: 'edit ' + drawioPath + ' via drawio embed',
      }),
    })
    .then(r => r.json())
    .then(j => {
      saving = false;
      if (j.ok) setStat('✓ commit ' + (j.sha||'').slice(0,7) + '  ·  ~8s 后博客刷新', 'ok');
      else     setStat('commit 失败: ' + (j.error||'unknown'), 'err');
    })
    .catch(err => { saving = false; setStat('commit 失败: ' + err, 'err'); });
  }
});
</script>
</body>
</html>
