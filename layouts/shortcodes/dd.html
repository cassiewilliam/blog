{{- /* {{< dd title="…" >}}…{{< /dd >}}  ·  green "DEEP DIVE" panel
       (the deep-dive sibling of {{< supp >}}'s blue card) */ -}}
{{- $title := .Get "title" -}}
<aside class="cc-dd" style="background:#eef7ee;border-left:4px solid #5fa55f;margin:16px 0;padding:14px 18px;border-radius:4px;color:#1a3d1a;line-height:1.75;font-size:14.2px">
  <div style="display:inline-block;background:#5fa55f;color:#fff;font-size:11.5px;font-weight:700;padding:2px 10px;border-radius:3px;letter-spacing:.5px;margin-bottom:8px">DEEP DIVE</div>
  {{- with $title }}
  <div style="font-size:1.04em;color:#0f3d0f;margin:.2em 0 .6em;font-weight:700">{{ . }}</div>
  {{- end }}
  <div class="cc-dd-body">
{{ .Inner | .Page.RenderString (dict "display" "block") }}
  </div>
</aside>
