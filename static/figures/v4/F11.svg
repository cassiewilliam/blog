<svg viewbox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="pt_ar" markerheight="7" markerwidth="7" orient="auto" refx="10" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#333"></path></marker></defs>
<rect fill="#fff" height="320" width="1000"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="500" y="24">Post-Training Pipeline · specialist SFT + GRPO → multi-teacher OPD</text>
<g transform="translate(30,60)"><rect fill="#eef3ff" height="200" rx="6" stroke="#4a6fd3" width="220" x="0" y="0"></rect><text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="110" y="24">① Specialist Training</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="50">for each domain (math, code,</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="66">agent, instruction following):</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="110" y="90">SFT → GRPO RL</text><text fill="#1a3a5c" font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="110">generative reward model (GRM)</text><text fill="#1a3a5c" font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="126">actor itself acts as judge</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="150">three reasoning modes:</text><text font-family="monospace" font-size="10.5" text-anchor="middle" x="110" y="170">Non-think / Think High / Max</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="110" y="188">diff length penalty per mode</text></g>
<g transform="translate(280,60)"><rect fill="#fff4e0" height="200" rx="6" stroke="#e0b300" width="440" x="0" y="0"></rect><text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="220" y="24">② On-Policy Distillation (OPD, replaces mixed RL)</text><text font-family="sans-serif" font-size="12" text-anchor="middle" x="220" y="54">L_OPD(θ) = Σ_i w_i · D_KL( π_θ ‖ π_Ei )</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="220" y="82">full-vocabulary (|V|&gt;100k) exact reverse-KL</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="220" y="102">teacher-weights offloaded to distributed storage</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="220" y="122">cache last-layer hidden state → rebuild logits on-the-fly</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="220" y="142">order minibatch by teacher idx → one head resident</text><text fill="#7a4e00" font-family="sans-serif" font-size="11" text-anchor="middle" x="220" y="162">&gt; 10 teacher models distilled into one student</text><text fill="#7a4e00" font-family="sans-serif" font-size="11" text-anchor="middle" x="220" y="182">TileLang kernel for exact KL (+ &lt;1 μs host cost)</text></g>
<g transform="translate(750,60)"><rect fill="#f4faf4" height="200" rx="6" stroke="#5fa55f" width="220" x="0" y="0"></rect><text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="110" y="24">③ Infrastructure</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="48">FP4 rollout (real MXFP4)</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="64">token-granular WAL</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="80">preemptible rollout service</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="96">metadata-only dispatch</text><text font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="112">shared-memory data loader</text><text fill="#1a3d1a" font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="136">DSec sandbox (Rust):</text><text fill="#1a3d1a" font-family="sans-serif" font-size="11" text-anchor="middle" x="110" y="152">Function / Container / μVM / VM</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="110" y="168">3FS + EROFS + overlaybd</text><text fill="#555" font-family="sans-serif" font-size="10.5" text-anchor="middle" x="110" y="184">hundreds of thousands / cluster</text></g>
<line marker-end="url(#pt_ar)" stroke="#333" x1="250" x2="278" y1="160" y2="160"></line>
<line marker-end="url(#pt_ar)" stroke="#333" x1="720" x2="748" y1="160" y2="160"></line>
<text fill="#555" font-family="monospace" font-size="11" text-anchor="middle" x="500" y="300">Anticipatory Routing + SwiGLU clamping [-10,10] → stabilize trillion-parameter training</text>
</svg>