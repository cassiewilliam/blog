<svg viewbox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fff" height="260" width="1000"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="500" y="24">Batch-Invariant Kernel · dual-kernel decoding</text>
<g transform="translate(40,52)"><rect fill="#fff5f0" height="170" rx="4" stroke="#b85450" width="430" x="0" y="0"></rect><text font-family="sans-serif" font-size="12.5" font-weight="700" text-anchor="middle" x="215" y="24">(a) traditional split-KV · non-deterministic</text><text font-family="monospace" font-size="10.5" x="20" y="50">SM0: partial sum of K[0..127]</text><text font-family="monospace" font-size="10.5" x="20" y="66">SM1: partial sum of K[128..255]</text><text font-family="monospace" font-size="10.5" x="20" y="82">SM2: partial sum of K[256..383]</text><text fill="#b85450" font-family="monospace" font-size="10.5" x="20" y="110">atomicAdd(output, partial) — non-associative</text><text fill="#b85450" font-family="monospace" font-size="10.5" x="20" y="126">batch shape changes → bit-level jitter</text><text fill="#555" font-family="sans-serif" font-size="10.5" x="20" y="150">hard to debug · training/inference mismatch</text></g>
<g transform="translate(520,52)"><rect fill="#f4faf4" height="170" rx="4" stroke="#5fa55f" width="440" x="0" y="0"></rect><text font-family="sans-serif" font-size="12.5" font-weight="700" text-anchor="middle" x="220" y="24">(b) DeepSeek-V4 dual-kernel · bitwise reproducible</text><text font-family="monospace" font-size="10.5" x="20" y="50">kernel A: one SM handles whole seq (main wave)</text><text font-family="monospace" font-size="10.5" x="20" y="66">kernel B: multi-SM for trailing partial wave</text><text font-family="monospace" font-size="10.5" x="20" y="86">distributed shared memory (thread-block cluster)</text><text font-family="monospace" font-size="10.5" x="20" y="102">accumulation order matches kernel A exactly</text><text fill="#1a3d1a" font-family="sans-serif" font-size="10.5" x="20" y="130">✔ output is independent of batch position</text><text fill="#1a3d1a" font-family="sans-serif" font-size="10.5" x="20" y="150">✔ RL rollout reuses training logits</text></g>
</svg>