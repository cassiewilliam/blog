<text x="500" y="358" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" font-style="italic" font-weight="700" fill="#a33ea1">Δ<tspan baseline-shift="-25%" font-size="12.6">v</tspan> = Σ<tspan baseline-shift="-25%" font-size="12.6">i</tspan> Δ<tspan baseline-shift="-25%" font-size="12.6">uᵢ</tspan> · ∂u<tspan baseline-shift="-25%" font-size="12.6">i</tspan>/∂v</text>
<text x="500" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" fill="#57606a">If a value feeds several children, backprop sums every downstream path.</text>
