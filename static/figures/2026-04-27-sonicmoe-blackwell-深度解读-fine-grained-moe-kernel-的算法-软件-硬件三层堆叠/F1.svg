<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 520">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4d5562"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}
      .title{font-size:28px;font-weight:700}
      .subtitle{font-size:13px;fill:#667085}
      .lane{font-size:14px;font-weight:700;fill:#667085}
      .head{font-size:15px;font-weight:700}
      .small{font-size:12.5px;fill:#344054}
      .formula{font-family:Georgia,"Times New Roman",serif;font-size:21px;font-style:italic}
      .formulaSm{font-family:Georgia,"Times New Roman",serif;font-size:17px;font-style:italic}
      .sub{font-size:12px;baseline-shift:sub}
      .box{stroke-width:2}
      .thin{stroke-width:1.4}
      .edge{stroke:#4d5562;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#667085;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .cache{fill:#fff5f0;stroke:#b85450;stroke-width:1.6}
      .io{fill:#fff;stroke:#d0d7de;stroke-width:1.4}
    </style>
  </defs>

  <rect width="1160" height="520" fill="#fff"/>
  <text x="40" y="48" class="title">Standard MoE: the hidden cost is materialized routing tensors</text>
  <text x="40" y="76" class="subtitle">The math is simple; the expensive part is carrying gathered/scattered activations through HBM.</text>
  <text x="55" y="125" class="lane">Forward</text>
  <rect x="110" y="145" width="150" height="78" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="185.0" y="173" text-anchor="middle" class="head">Gather</text>
  <text x="185.0" y="201" text-anchor="middle" class="formula">X<tspan class="sub">e</tspan> = G(X,π)</text>
  <rect x="285" y="145" width="150" height="78" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="360.0" y="173" text-anchor="middle" class="head">Up + act</text>
  <text x="360.0" y="201" text-anchor="middle" class="formula">H<tspan class="sub">e</tspan> → A<tspan class="sub">e</tspan></text>
  <path d="M260 184 L285 184" class="edge"/>
  <rect x="470" y="145" width="150" height="78" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="545.0" y="173" text-anchor="middle" class="head">Down</text>
  <text x="545.0" y="201" text-anchor="middle" class="formula">Y<tspan class="sub">e</tspan> = A<tspan class="sub">e</tspan>W<tspan class="sub">2,e</tspan></text>
  <path d="M435 184 L470 184" class="edge"/>
  <rect x="650" y="145" width="150" height="78" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="725.0" y="173" text-anchor="middle" class="head">Scatter</text>
  <text x="725.0" y="201" text-anchor="middle" class="formula">Y → Y<tspan class="sub">dense</tspan></text>
  <path d="M620 184 L650 184" class="edge"/>
  <rect x="840" y="145" width="195" height="78" rx="9" fill="#fff8e7" stroke="#e0b300" class="box"/>
  <text x="937.5" y="173" text-anchor="middle" class="head">Aggregate</text>
  <text x="937.5" y="201" text-anchor="middle" class="formula">O<tspan class="sub">t</tspan> = Σ<tspan class="sub">e</tspan> π<tspan class="sub">t,e</tspan>S<tspan class="sub">t,e</tspan>Y<tspan class="sub">e,t</tspan></text>
  <path d="M800 184 L840 184" class="edge"/>
  <text x="55" y="305" class="lane">Backward needs cached intermediates</text>
  <rect x="120" y="330" width="190" height="86" rx="9" fill="#fff5f0" stroke="#b85450" class="box"/>
  <text x="215.0" y="358" text-anchor="middle" class="head">Activation grad</text>
  <text x="215.0" y="386" text-anchor="middle" class="formula">dY = S ⊙ dO</text>
  <text x="215.0" y="413" text-anchor="middle" class="small">dY ∈ R^(TK×d)</text>
  <rect x="375" y="330" width="190" height="86" rx="9" fill="#fff5f0" stroke="#b85450" class="box"/>
  <text x="470.0" y="358" text-anchor="middle" class="head">Weight grad</text>
  <text x="470.0" y="386" text-anchor="middle" class="formula">dW<tspan class="sub">1</tspan> = X<tspan class="sub">e</tspan><tspan baseline-shift="super" font-size="12">T</tspan>dH<tspan class="sub">e</tspan></text>
  <text x="470.0" y="413" text-anchor="middle" class="small">X_e ∈ R^(TK×d)</text>
  <rect x="630" y="330" width="205" height="86" rx="9" fill="#fff5f0" stroke="#b85450" class="box"/>
  <text x="732.5" y="358" text-anchor="middle" class="head">Router grad</text>
  <text x="732.5" y="386" text-anchor="middle" class="formula">dS = ⟨dO,Y⟩</text>
  <text x="732.5" y="413" text-anchor="middle" class="small">Y ∈ R^(TK×d)</text>
  <rect x="910" y="330" width="190" height="86" rx="9" fill="#fff5f0" stroke="#b85450" class="box"/>
  <text x="1005.0" y="358" text-anchor="middle" class="head">Peak cache</text>
  <text x="1005.0" y="386" text-anchor="middle" class="formula">{X<tspan class="sub">e</tspan>,Y,dY,dO<tspan class="sub">e</tspan>}</text>
  <text x="1005.0" y="413" text-anchor="middle" class="small">∼ O(TKd)</text>
  <path d="M310 370 L375 370" class="edge"/>
  <path d="M565 370 L630 370" class="edge"/>
  <path d="M835 370 L910 370" class="edge"/>
  <path d="M177 223 C177 270 210 292 210 330" class="dash"/>
  <path d="M352 223 C352 270 470 292 470 330" class="dash"/>
  <path d="M707 223 C707 270 730 292 730 330" class="dash"/>
</svg>
