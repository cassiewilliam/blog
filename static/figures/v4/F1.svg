<svg font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif" viewbox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="ov_ar" markerheight="6" markerwidth="6" orient="auto" refx="9" refy="5" viewbox="0 0 10 10">
<path d="M0,0 L10,5 L0,10 z" fill="#4b5563"></path>
</marker>
<filter height="110%" id="ov_shadow" width="104%" x="-2%" y="-5%">
<fegaussianblur in="SourceAlpha" stddeviation="1.3"></fegaussianblur>
<feoffset dx="0" dy="1.5" result="o"></feoffset>
<fecomponenttransfer><fefunca slope="0.15" type="linear"></fefunca></fecomponenttransfer>
<femerge><femergenode></femergenode><femergenode in="SourceGraphic"></femergenode></femerge>
</filter>
</defs>
<rect fill="#ffffff" height="560" width="1100"></rect>
<!-- Title -->
<text fill="#111827" font-size="17" font-weight="700" text-anchor="middle" x="550" y="36">DeepSeek-V4 Stack · Overall Architecture</text>
<text fill="#6b7280" font-size="11.5" text-anchor="middle" x="550" y="56">redrawn after paper Figure 2 · left = embedding, center = a single Transformer block, right = MTP head</text>
<!-- Left: Embedding -->
<g filter="url(#ov_shadow)">
<rect fill="#fff8e7" height="100" rx="10" stroke="#d9a400" stroke-width="1.5" width="160" x="40" y="240"></rect>
</g>
<text fill="#6b4a00" font-size="13" font-weight="700" text-anchor="middle" x="120" y="272">Embedding</text>
<text fill="#6b4a00" font-size="11" text-anchor="middle" x="120" y="292">+ Input Tokens</text>
<line stroke="#e3c05a" stroke-width="1" x1="58" x2="182" y1="302" y2="302"></line>
<text fill="#8a6f2f" font-size="10" text-anchor="middle" x="120" y="320">vocab 128 K</text>
<text fill="#8a6f2f" font-size="10" text-anchor="middle" x="120" y="334">d = 7168 (Pro) / 4096 (Flash)</text>
<!-- Center: Transformer block -->
<g filter="url(#ov_shadow)">
<rect fill="#f9fafb" height="420" rx="12" stroke="#9ca3af" stroke-dasharray="5 4" stroke-width="1.2" width="640" x="230" y="88"></rect>
</g>
<text fill="#111827" font-size="13" font-weight="700" text-anchor="middle" x="550" y="112">Transformer Block × L</text>
<text fill="#6b7280" font-size="11" text-anchor="middle" x="550" y="130">V4-Pro L = 61  ·  V4-Flash L = 43</text>
<!-- Pre mHC -->
<rect fill="#eef3ff" height="46" rx="8" stroke="#4a6fd3" stroke-width="1.3" width="580" x="260" y="152"></rect>
<text fill="#1a2d55" font-size="12" font-weight="600" text-anchor="middle" x="550" y="172">Pre-Block Mixing · mHC</text>
<text fill="#4a6fd3" font-size="10.5" text-anchor="middle" x="550" y="189">Birkhoff polytope + Sinkhorn-Knopp (n_hc = 4, t_max = 20)</text>
<!-- Attention row: CSA | HCA -->
<rect fill="#fff5f0" height="78" rx="8" stroke="#b85450" stroke-width="1.3" width="280" x="260" y="214"></rect>
<text fill="#7a2f2b" font-size="12.5" font-weight="700" text-anchor="middle" x="400" y="236">CSA · Compressed Sparse Attention</text>
<line stroke="#e8c3bf" stroke-width="1" x1="278" x2="522" y1="245" y2="245"></line>
<text fill="#7a2f2b" font-size="10.5" text-anchor="middle" x="400" y="262">compress rate  m = 4</text>
<text fill="#7a2f2b" font-size="10.5" text-anchor="middle" x="400" y="278">lightning indexer + top-k = 512 / 1024</text>
<rect fill="#f4faf4" height="78" rx="8" stroke="#5fa55f" stroke-width="1.3" width="280" x="560" y="214"></rect>
<text fill="#1a5c1a" font-size="12.5" font-weight="700" text-anchor="middle" x="700" y="236">HCA · Heavily Compressed Attention</text>
<line stroke="#c9e5c9" stroke-width="1" x1="578" x2="822" y1="245" y2="245"></line>
<text fill="#1a5c1a" font-size="10.5" text-anchor="middle" x="700" y="262">compress rate  m' = 128</text>
<text fill="#1a5c1a" font-size="10.5" text-anchor="middle" x="700" y="278">dense attention on the 1/128 KV view</text>
<text fill="#6b7280" font-size="10.5" font-style="italic" text-anchor="middle" x="550" y="310">CSA and HCA layers alternate · every layer also carries a 128-token SWA branch</text>
<!-- Post mHC -->
<rect fill="#eef3ff" height="36" rx="8" stroke="#4a6fd3" stroke-width="1.3" width="580" x="260" y="322"></rect>
<text fill="#1a2d55" font-size="11.5" text-anchor="middle" x="550" y="345">Post-Block Mixing · mHC output mapping  C_l  (2σ, RMS-rescaled)</text>
<!-- MoE -->
<rect fill="#f9eef8" height="118" rx="8" stroke="#a33ea1" stroke-width="1.3" width="580" x="260" y="372"></rect>
<text fill="#4a1a48" font-size="12.5" font-weight="700" text-anchor="middle" x="550" y="394">DeepSeekMoE · 1 shared + 256 / 384 routed experts · top-6</text>
<line stroke="#d1b8cf" stroke-width="1" x1="285" x2="815" y1="406" y2="406"></line>
<text fill="#4a1a48" font-size="10.5" text-anchor="middle" x="550" y="424">Hash routing on first 3 MoE layers · auxiliary-loss-free + balance loss</text>
<text fill="#4a1a48" font-size="10.5" text-anchor="middle" x="550" y="442">Sqrt(Softplus) affinity · fused MegaMoE mega-kernel (dispatch→L1→L2→combine)</text>
<text fill="#4a1a48" font-size="10.5" text-anchor="middle" x="550" y="460">FP4 expert weights (MXFP4) · fine-grained EP wave overlap · pull-based RDMA</text>
<text fill="#4a1a48" font-size="10.5" font-style="italic" text-anchor="middle" x="550" y="478">C/B ≤ 2d = 6144 FLOPs/B  ⇒  1 GBps covers 6.1 TFLOP/s</text>
<!-- Right: MTP head -->
<g filter="url(#ov_shadow)">
<rect fill="#fff8e7" height="220" rx="10" stroke="#d9a400" stroke-width="1.5" width="160" x="900" y="180"></rect>
</g>
<text fill="#6b4a00" font-size="13" font-weight="700" text-anchor="middle" x="980" y="208">MTP head</text>
<line stroke="#e3c05a" stroke-width="1" x1="915" x2="1045" y1="220" y2="220"></line>
<text fill="#6b4a00" font-size="11" text-anchor="middle" x="980" y="240">depth = 1</text>
<text fill="#6b4a00" font-size="11" text-anchor="middle" x="980" y="258">LM loss</text>
<text fill="#6b4a00" font-size="11" text-anchor="middle" x="980" y="278">consumes last hidden</text>
<text fill="#6b4a00" font-size="11" text-anchor="middle" x="980" y="294">as draft input</text>
<line stroke="#e3c05a" stroke-dasharray="3 2" stroke-width="1" x1="915" x2="1045" y1="310" y2="310"></line>
<text fill="#8a6f2f" font-size="10.5" font-style="italic" text-anchor="middle" x="980" y="332">→ speculative decode</text>
<text fill="#8a6f2f" font-size="10.5" font-style="italic" text-anchor="middle" x="980" y="348">folded into vLLM's</text>
<text fill="#8a6f2f" font-size="10.5" font-style="italic" text-anchor="middle" x="980" y="364">decode batch</text>
<!-- Arrows -->
<line marker-end="url(#ov_ar)" stroke="#4b5563" stroke-width="1.6" x1="200" x2="228" y1="290" y2="290"></line>
<line marker-end="url(#ov_ar)" stroke="#4b5563" stroke-width="1.6" x1="870" x2="898" y1="290" y2="290"></line>
<!-- Footer stats -->
<line stroke="#e5e7eb" stroke-width="1" x1="80" x2="1020" y1="528" y2="528"></line>
<text fill="#6b7280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" text-anchor="middle" x="550" y="548">V4-Pro  1.6 T / 49 B act    ·    V4-Flash  284 B / 13 B act    ·    native context  1,048,576 tokens</text>
</svg>