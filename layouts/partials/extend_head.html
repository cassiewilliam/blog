{{- /* KaTeX math + drawio viewer · added 2026-04-28 */ -}}
{{- if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
(function () {
  function render() {
    if (typeof renderMathInElement === "undefined") {
      // auto-render hasn't loaded yet; retry shortly
      setTimeout(render, 50);
      return;
    }
    renderMathInElement(document.body, {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$",  right: "$",  display: false}
      ],
      ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"],
      throwOnError: false
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", render);
  } else {
    render();
  }
})();
</script>
{{- end }}

{{- if or .Params.drawio .Site.Params.drawio }}
<script type="text/javascript" src="https://viewer.diagrams.net/js/viewer-static.min.js" defer></script>
{{- end }}
