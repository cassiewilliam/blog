<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="430" fill="#ffffff"/>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">Attention backward: split, softmax, rejoin</text>
<text x="500" y="64" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">the input gradient is the sum of Q, K, and V projection branches</text>
<rect x="420" y="86" width="160" height="54" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="500" y="119" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="16" font-style="italic" font-weight="700" fill="#24292f">Δ<tspan baseline-shift="-25%" font-size="11.2">Y</tspan></text>
<line x1="420" y1="113" x2="270" y2="180" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="500" y1="142" x2="500" y2="180" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="580" y1="113" x2="730" y2="180" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="130" y="180" width="220" height="78" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="240" y="208" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">value branch</text>
<text x="240" y="232" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="600" fill="#24292f">Δ<tspan baseline-shift="-25%" font-size="9.8">V</tspan> = P<tspan baseline-shift="38%" font-size="9.8">T</tspan> Δ<tspan baseline-shift="-25%" font-size="9.8">Y</tspan></text>
<rect x="390" y="180" width="220" height="78" rx="8" fill="#fbf0fb" stroke="#a33ea1" stroke-width="2"/>
<text x="500" y="208" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">prob branch</text>
<text x="500" y="232" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="600" fill="#24292f">Δ<tspan baseline-shift="-25%" font-size="9.8">P</tspan> = Δ<tspan baseline-shift="-25%" font-size="9.8">Y</tspan> V<tspan baseline-shift="38%" font-size="9.8">T</tspan></text>
<rect x="650" y="180" width="220" height="78" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="760" y="208" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">score branch</text>
<text x="760" y="232" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="600" fill="#24292f">Δ<tspan baseline-shift="-25%" font-size="9.8">S</tspan> = J<tspan baseline-shift="-25%" font-size="9.8">softmax</tspan><tspan baseline-shift="38%" font-size="9.8">T</tspan> Δ<tspan baseline-shift="-25%" font-size="9.8">P</tspan></text>
<line x1="760" y1="260" x2="650" y2="325" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="760" y1="260" x2="870" y2="325" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="540" y="325" width="220" height="62" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="650" y="352" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="700" fill="#24292f">Δ<tspan baseline-shift="-25%" font-size="9.8">Q</tspan> = Δ<tspan baseline-shift="-25%" font-size="9.8">S</tspan>K / √d<tspan baseline-shift="-25%" font-size="9.8">h</tspan></text>
<rect x="770" y="325" width="180" height="62" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="860" y="352" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" font-style="italic" font-weight="700" fill="#24292f">Δ<tspan baseline-shift="-25%" font-size="9.8">K</tspan> = Δ<tspan baseline-shift="-25%" font-size="9.8">S</tspan><tspan baseline-shift="38%" font-size="9.8">T</tspan>Q / √d<tspan baseline-shift="-25%" font-size="9.8">h</tspan></text>
<rect x="140" y="325" width="260" height="62" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
<text x="270" y="350" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="12" font-style="italic" font-weight="700" fill="#24292f">Δ<tspan baseline-shift="-25%" font-size="8.4">X</tspan> = Δ<tspan baseline-shift="-25%" font-size="8.4">Q</tspan>W<tspan baseline-shift="-25%" font-size="8.4">q</tspan><tspan baseline-shift="38%" font-size="8.4">T</tspan> + Δ<tspan baseline-shift="-25%" font-size="8.4">K</tspan>W<tspan baseline-shift="-25%" font-size="8.4">k</tspan><tspan baseline-shift="38%" font-size="8.4">T</tspan> + Δ<tspan baseline-shift="-25%" font-size="8.4">V</tspan>W<tspan baseline-shift="-25%" font-size="8.4">v</tspan><tspan baseline-shift="38%" font-size="8.4">T</tspan></text>
</svg>
