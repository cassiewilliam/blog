<line marker-end="url(#hca_ar)" stroke="#333" x1="370" x2="400" y1="94" y2="94"></line>
<line marker-end="url(#hca_ar)" stroke="#333" x1="562" x2="598" y1="94" y2="94"></line>
<rect fill="#eef7ee" height="90" rx="4" stroke="#5fa55f" width="560" x="130" y="160"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="410" y="184">Dense Attention across all L/128 compressed entries</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="410" y="204">shared-KV MQA, partial RoPE(64), attention sink</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="410" y="220">+ 128-token sliding window branch</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="410" y="238">grouped output projection as CSA</text>
