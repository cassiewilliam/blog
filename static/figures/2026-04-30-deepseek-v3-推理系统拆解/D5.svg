<svg viewBox="0 0 1000 355" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="#1f3a6f">CUDA Graph 在 Decode MoE 的兼容路径</text>
<g font-family="sans-serif" font-size="11.5">
  <rect x="60" y="60" width="880" height="280" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>

  <rect x="80" y="90" width="220" height="60" rx="4" fill="#eef7ee" stroke="#5fa55f"/>
  <text x="190" y="114" text-anchor="middle" font-weight="700">① 录制 Graph</text>
  <text x="190" y="132" text-anchor="middle" fill="#1a3d1a">固定 max_tokens + 固定 shape</text>

  <rect x="340" y="90" width="220" height="60" rx="4" fill="#eef3ff" stroke="#4a6fd3"/>
  <text x="450" y="114" text-anchor="middle" font-weight="700">② Replay — 每 decode step</text>
  <text x="450" y="132" text-anchor="middle" fill="#1f3a6f">只变 KV cache 指针 + counters</text>

  <rect x="600" y="90" width="320" height="60" rx="4" fill="#fff4e0" stroke="#e0b300"/>
  <text x="760" y="114" text-anchor="middle" font-weight="700">③ DP dummy batch 协同</text>
  <text x="760" y="132" text-anchor="middle" fill="#5a3f00">所有 rank 都必须进 MoE（All2All 不 hang）</text>

  <!-- sub boxes -->
  <text x="80" y="185" font-weight="700" fill="#333">Graph 中必须固定的东西：</text>
  <text x="80" y="205" fill="#333">• batched_hidden_states (2, max_m, H)，DBO 两套 buffer</text>
  <text x="80" y="223" fill="#333">• DeepEP LL handle（recv buffer 指针）</text>
  <text x="80" y="241" fill="#333">• DeepGEMM Masked 的 expert_num_tokens 向量地址（指向每步更新的 counter）</text>
  <text x="80" y="259" fill="#333">• cudagraph_capture_sizes 在 DP 所有 rank 上同步一致</text>
  <text x="80" y="277" fill="#333">• Shared Expert aux stream 也要在 graph 中录制</text>
  <text x="80" y="309" fill="#b85450" font-weight="700">★ HT 模式的 num_tokens_per_rank 依赖真实 token 数 → 无法录制（因此 Prefill 不走 Graph）</text>
</g>
</svg>