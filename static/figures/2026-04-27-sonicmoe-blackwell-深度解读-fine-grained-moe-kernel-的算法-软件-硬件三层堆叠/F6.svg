<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#1f2328}
      .title{font-size:32px;font-weight:700}
      .h{font-size:18px;font-weight:700}
      .p{font-size:14px}
      .mono{font-family:Menlo,Consolas,monospace;font-size:14px}
      .box{stroke-width:2;rx:10}
      .edge{stroke:#555;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#777;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="600" y="48" text-anchor="middle" class="title">Router-side optimizations: implementation vs. routing policy</text>

  <rect x="45" y="95" width="190" height="92" fill="#dae8fc" stroke="#6c8ebf" class="box"/>
  <text x="140" y="125" text-anchor="middle" class="h">Router logits</text>
  <text x="140" y="153" text-anchor="middle" class="mono">S[t, 0:E]</text>
  <text x="140" y="174" text-anchor="middle" class="p">dense scores per token</text>

  <rect x="300" y="80" width="250" height="122" fill="#d5e8d4" stroke="#82b366" class="box"/>
  <text x="425" y="112" text-anchor="middle" class="h">Efficient top-K kernel</text>
  <text x="425" y="140" text-anchor="middle" class="p">same TC semantics</text>
  <text x="425" y="162" text-anchor="middle" class="p">register / warp compare-swap</text>
  <text x="425" y="184" text-anchor="middle" class="p">optional softmax fusion</text>

  <rect x="625" y="95" width="220" height="92" fill="#fff2cc" stroke="#d6b656" class="box"/>
  <text x="735" y="125" text-anchor="middle" class="h">TC top-K metadata</text>
  <text x="735" y="153" text-anchor="middle" class="mono">pi[t,k], score[t,k]</text>
  <text x="735" y="174" text-anchor="middle" class="p">baseline routing result</text>

  <rect x="930" y="80" width="225" height="122" fill="#dae8fc" stroke="#6c8ebf" class="box"/>
  <text x="1042" y="112" text-anchor="middle" class="h">MoE compute kernels</text>
  <text x="1042" y="140" text-anchor="middle" class="p">routing-agnostic</text>
  <text x="1042" y="162" text-anchor="middle" class="p">consume pi and score</text>
  <text x="1042" y="184" text-anchor="middle" class="p">forward / backward reuse</text>

  <path d="M235 141 H300" class="edge"/>
  <path d="M550 141 H625" class="edge"/>
  <path d="M845 141 H930" class="edge"/>

  <rect x="255" y="260" width="250" height="132" fill="#f8cecc" stroke="#b85450" class="box"/>
  <text x="380" y="292" text-anchor="middle" class="h">Token rounding</text>
  <text x="380" y="320" text-anchor="middle" class="p">training-time policy change</text>
  <text x="380" y="342" text-anchor="middle" class="p">round per-expert counts</text>
  <text x="380" y="364" text-anchor="middle" class="mono">T_e -> multiple of M_tile</text>

  <rect x="575" y="260" width="270" height="132" fill="#fff" stroke="#666" class="box"/>
  <text x="710" y="292" text-anchor="middle" class="h">Why it helps</text>
  <text x="710" y="320" text-anchor="middle" class="p">less tile padding waste</text>
  <text x="710" y="342" text-anchor="middle" class="p">only touches tail tile</text>
  <text x="710" y="364" text-anchor="middle" class="p">quality-speed tradeoff</text>

  <rect x="915" y="260" width="235" height="132" fill="#e1d5e7" stroke="#9673a6" class="box"/>
  <text x="1032" y="292" text-anchor="middle" class="h">Inference / other routers</text>
  <text x="1032" y="320" text-anchor="middle" class="p">usually switch back to TC</text>
  <text x="1032" y="342" text-anchor="middle" class="p">custom routers allowed</text>
  <text x="1032" y="364" text-anchor="middle" class="p">same compute interface</text>

  <path d="M735 187 C735 232 380 222 380 260" class="dash"/>
  <path d="M505 326 H575" class="edge"/>
  <path d="M845 326 H915" class="edge"/>
  <path d="M1032 260 C1032 230 1042 222 1042 202" class="dash"/>

  <rect x="80" y="430" width="1040" height="58" fill="#fafbfc" stroke="#d0d7de" class="box"/>
  <text x="100" y="456" class="h">Rule of thumb</text>
  <text x="250" y="456" class="p">Top-K kernel removes router overhead without changing routing; token rounding changes training routing to match GEMM tiles.</text>
  <text x="250" y="478" class="p">Both produce the same kind of sparse metadata for SonicMoE compute kernels.</text>
</svg>
