<svg viewbox="0 0 1100 400" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="sd_ar" markerheight="7" markerwidth="7" orient="auto" refx="10" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#333"></path></marker></defs>
<rect fill="#fff" height="400" width="1100"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="550" y="24">MTP speculative decode · batch-shape propagation (MTP depth = 1)</text>
<!-- Step t: main decode -->
<rect fill="#eef3ff" height="80" rx="4" stroke="#4a6fd3" width="320" x="30" y="56"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="190" y="78">Step t  —  main decode</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="190" y="98">q_main  : [num_decodes, 128, 576]</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="190" y="114">logits  : [num_decodes, 129280]</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="190" y="128">sample one token per req</text>
<!-- MTP draft -->
<rect fill="#f9eef8" height="80" rx="4" stroke="#a33ea1" width="320" x="380" y="56"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="540" y="78">MTP head  —  same step</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="540" y="98">hidden_last  : [num_decodes, 7168]</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="540" y="114">draft_logits : [num_decodes, 129280]</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="540" y="128">produces +1 draft token / req</text>
<!-- Merge into next step batch -->
<rect fill="#fff4e0" height="80" rx="4" stroke="#e0b300" width="340" x="730" y="56"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="900" y="78">Step t+1 batch (speculative)</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="900" y="98">num_decode_tokens = 2 · num_decodes</text>
<text font-family="monospace" font-size="10.5" text-anchor="middle" x="900" y="114">q : [num_decode_tokens, 128, 576]</text>
<text fill="#555" font-family="monospace" font-size="10" text-anchor="middle" x="900" y="128">[verify_token_t, draft_token_{t+1}] × num_decodes</text>
<line marker-end="url(#sd_ar)" stroke="#333" x1="350" x2="380" y1="96" y2="96"></line>
<line marker-end="url(#sd_ar)" stroke="#333" x1="700" x2="730" y1="96" y2="96"></line>
<!-- Step t+1 -->
<rect fill="#eef7ee" height="100" rx="4" stroke="#5fa55f" stroke-width="2" width="1040" x="30" y="162"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="550" y="184">Step t+1  —  single flash_mla_with_kvcache call handles verify + draft jointly</text>
<text font-family="monospace" font-size="11" x="60" y="208">q                        : [num_decode_tokens, 1, 128, 576]   bf16</text>
<text font-family="monospace" font-size="11" x="60" y="226">indices (SWA)            : [num_decode_tokens, 128]           int32</text>
<text font-family="monospace" font-size="11" x="60" y="244">extra_indices_in_kvcache : [num_decode_tokens, 1, 1024]       int32  (indexer re-selects top-k per draft token)</text>
<text fill="#1a3d1a" font-family="monospace" font-size="11" x="800" y="208">out : [num_decode_tokens, 1, 128, 576]</text>
<text fill="#1a3d1a" font-family="monospace" font-size="11" x="800" y="226">tile_scheduler reused</text>
<text fill="#1a3d1a" font-family="monospace" font-size="11" x="800" y="244">decode_threshold += 1</text>
<rect fill="#fff5f0" height="90" rx="4" stroke="#b85450" width="1040" x="30" y="280"></rect>
<text font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle" x="550" y="302">Verification  —  sampler picks from verify logits; kept drafts promote to next-step main</text>
<text font-family="monospace" font-size="11" x="60" y="326">accepted_mask : [num_decodes] bool    ·    accept if draft matches sampled verify token</text>
<text font-family="monospace" font-size="11" x="60" y="344">throughput gain ≈ 1 + acceptance_rate (typical 0.4–0.7 for V4-Pro MTP depth=1)</text>
<text fill="#555" font-family="monospace" font-size="11" x="60" y="362">MTP layer reuses the main tile_scheduler metadata → no extra kernel launches</text>
</svg>