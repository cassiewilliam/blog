{{- /* {{< supp title="…" >}}…{{< /supp >}}  ·  blue supplement card with title pill */ -}}
{{- $title := .Get "title" -}}
<aside class="cc-supp" style="background:#f0f7ff;border-left:4px solid #4a90e2;margin:16px 0;padding:14px 18px;border-radius:4px;color:#1a3a5c;line-height:1.75;font-size:14.2px">
  <div style="display:inline-block;background:#4a90e2;color:#fff;font-size:11.5px;font-weight:700;padding:2px 10px;border-radius:3px;letter-spacing:.5px;margin-bottom:8px">SUPPLEMENT · 知识点延伸</div>
  {{- with $title }}
  <div style="font-size:1.04em;color:#0e2e54;margin:.2em 0 .6em;font-weight:700">{{ . }}</div>
  {{- end }}
  <div class="cc-supp-body">
{{ .Inner | .Page.RenderString (dict "display" "block") }}
  </div>
</aside>
