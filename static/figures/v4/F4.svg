<svg viewbox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="csa_ar" markerheight="7" markerwidth="7" orient="auto" refx="10" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#333"></path></marker></defs>
<rect fill="#fff" height="420" width="1000"></rect>
<text font-family="sans-serif" font-size="16" font-weight="700" text-anchor="middle" x="500" y="26">CSA · Compressed Sparse Attention  (paper Figure 3)</text>
<text font-family="sans-serif" font-size="12" font-weight="600" x="30" y="72">Hidden States of KV tokens</text>
<g transform="translate(30,80)">
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="0" y="0"></rect>
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="30" y="0"></rect>
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="60" y="0"></rect>
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="90" y="0"></rect>
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="120" y="0"></rect>
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="150" y="0"></rect>
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="180" y="0"></rect>
<rect fill="#eef3ff" height="28" stroke="#4a6fd3" width="28" x="210" y="0"></rect>
<text font-family="monospace" font-size="10" text-anchor="middle" x="125" y="45">8 original tokens → 2 compressed entries (m=4)</text>
</g>
<rect fill="#fff4e0" height="40" rx="4" stroke="#e0b300" width="180" x="290" y="72"></rect>
<text font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle" x="380" y="90">Token-Level Compressor</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="380" y="106">Softmax(Z+B)⊙C  ·  overlapping m</text>
<g transform="translate(510,80)">
<rect fill="#f4faf4" height="28" stroke="#5fa55f" width="46" x="0" y="0"></rect><text font-family="monospace" font-size="10" text-anchor="middle" x="23" y="18">C_0</text>
<rect fill="#f4faf4" height="28" stroke="#5fa55f" width="46" x="50" y="0"></rect><text font-family="monospace" font-size="10" text-anchor="middle" x="73" y="18">C_1</text>
<rect fill="#f4faf4" height="28" stroke="#5fa55f" width="46" x="100" y="0"></rect><text font-family="monospace" font-size="10" text-anchor="middle" x="123" y="18">C_2</text>
<rect fill="#f4faf4" height="28" stroke="#5fa55f" width="46" x="150" y="0"></rect><text font-family="monospace" font-size="10" text-anchor="middle" x="173" y="18">…</text>
<rect fill="#f4faf4" height="28" stroke="#5fa55f" width="46" x="200" y="0"></rect><text font-family="monospace" font-size="10" text-anchor="middle" x="223" y="18">C_n/m</text>
</g>
<line marker-end="url(#csa_ar)" stroke="#333" x1="240" x2="290" y1="94" y2="92"></line>
<line marker-end="url(#csa_ar)" stroke="#333" x1="472" x2="508" y1="92" y2="92"></line>
<rect fill="#fff5f0" height="86" rx="4" stroke="#b85450" width="230" x="70" y="170"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="185" y="192">Lightning Indexer</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="185" y="210">indexer queries q^I (64 heads, FP4)</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="185" y="226">K^I compressed  ·  score I_ts</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="185" y="244">I = Σ_h w_h · ReLU(q_h · K^I)</text>
<rect fill="#f9eef8" height="86" rx="4" stroke="#a33ea1" width="160" x="340" y="170"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="420" y="196">Top-k Selector</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="420" y="215">k = 512 (Flash)</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="420" y="232">k = 1024 (Pro)</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="420" y="249">BF16 score path</text>
<rect fill="#eef7ee" height="86" rx="4" stroke="#5fa55f" width="230" x="540" y="170"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="655" y="192">Shared-KV MQA Core Attn</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="655" y="210">q_t,i (n_h heads) vs selected C_s</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="655" y="226">partial RoPE (last 64 dims)</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="655" y="244">attention sink + QK RMSNorm</text>
<rect fill="#fff4e0" height="86" rx="4" stroke="#e0b300" width="150" x="820" y="170"></rect>
<text font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle" x="895" y="192">Grouped Output</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="895" y="210">split n_h into g groups</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="895" y="226">project to d_g per group</text>
<text font-family="sans-serif" font-size="11" text-anchor="middle" x="895" y="244">concat → d</text>
<line marker-end="url(#csa_ar)" stroke="#333" x1="300" x2="340" y1="213" y2="213"></line>
<line marker-end="url(#csa_ar)" stroke="#333" x1="500" x2="540" y1="213" y2="213"></line>
<line marker-end="url(#csa_ar)" stroke="#333" x1="770" x2="820" y1="213" y2="213"></line>
<rect fill="#eef3ff" height="40" rx="4" stroke="#4a6fd3" stroke-dasharray="4 3" width="400" x="70" y="280"></rect>
<text font-family="sans-serif" font-size="12" text-anchor="middle" x="270" y="305">+ Sliding Window branch (n_win = 128 uncompressed K,V)</text>
<rect fill="#fff" height="40" rx="4" stroke="#333" width="150" x="820" y="280"></rect>
<text font-family="monospace" font-size="11" text-anchor="middle" x="895" y="305">query token h_t</text>
<line marker-end="url(#csa_ar)" stroke="#333" x1="895" x2="895" y1="280" y2="256"></line>
<text fill="#555" font-family="monospace" font-size="11" text-anchor="middle" x="500" y="360">CSA compresses seq-length to 1/m then DSA reads top-k compressed entries per query</text>
<text fill="#555" font-family="monospace" font-size="11" text-anchor="middle" x="500" y="378">complexity O(L·k) instead of O(L²), where k ≪ L/m</text>
</svg>