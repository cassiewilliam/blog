<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="14" fill="#333">单 Token Decode 延迟（60 MoE 层 DeepSeek-V3）</text>

<g font-family="sans-serif" font-size="12">
  <rect x="120" y="60"  width="40"  height="25" fill="#4a6fd3"/>
  <text x="100" y="77" text-anchor="end" fill="#1f3a6f">MLA 0.3 ms</text>

  <rect x="120" y="95"  width="15"  height="25" fill="#e0b300"/>
  <text x="100" y="112" text-anchor="end" fill="#7a4e00">Router 0.1 ms</text>

  <rect x="120" y="130" width="45"  height="25" fill="#e89a94"/>
  <text x="100" y="147" text-anchor="end" fill="#4a1515">LL Dispatch 0.35 ms</text>

  <rect x="120" y="165" width="95" height="25" fill="#5fa55f"/>
  <text x="100" y="182" text-anchor="end" fill="#1a3d1a">Masked GEMM 0.7 ms</text>

  <rect x="120" y="200" width="90" height="25" fill="#b85450"/>
  <text x="100" y="217" text-anchor="end" fill="#4a1515">LL Combine 0.7 ms</text>

  <rect x="120" y="235" width="60" height="25" fill="#a7bce0"/>
  <text x="100" y="252" text-anchor="end" fill="#1f3a6f">Shared MLP (overlap)</text>

  <line x1="120" y1="50" x2="120" y2="275" stroke="#333"/>
  <line x1="120" y1="275" x2="800" y2="275" stroke="#333"/>

  <g fill="#888" font-size="11">
    <text x="120" y="293" text-anchor="middle">0</text>
    <text x="270" y="293" text-anchor="middle">0.5</text>
    <text x="420" y="293" text-anchor="middle">1.0</text>
    <text x="570" y="293" text-anchor="middle">1.5</text>
    <text x="720" y="293" text-anchor="middle">2.0 ms / 层</text>
  </g>

  <rect x="660" y="60" width="260" height="200" rx="6" fill="#fffcf1" stroke="#d9b860"/>
  <text x="790" y="80" text-anchor="middle" font-weight="700" fill="#7a4e00">Decode 每 Token</text>
  <text x="790" y="102" text-anchor="middle" fill="#5a3f00">60 层 × ~1.8 ms = ~108 ms</text>
  <text x="790" y="124" text-anchor="middle" fill="#5a3f00">DBO + Graph 后 ~65-70 ms</text>
  <text x="790" y="154" text-anchor="middle" font-weight="700" fill="#7a4e00">ITL (interval between tokens)</text>
  <text x="790" y="176" text-anchor="middle" fill="#5a3f00">目标 &lt; 30-50 ms</text>
  <text x="790" y="206" text-anchor="middle" font-weight="700" fill="#7a4e00">关键瓶颈</text>
  <text x="790" y="228" text-anchor="middle" fill="#5a3f00">RDMA per-op latency</text>
  <text x="790" y="248" text-anchor="middle" fill="#5a3f00">（不是带宽 — 是尾延迟）</text>
</g>
</svg>