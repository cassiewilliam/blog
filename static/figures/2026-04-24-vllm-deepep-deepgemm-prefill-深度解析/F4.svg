<svg viewBox="0 0 1000 370" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#555"/></marker></defs>
<text x="500" y="22" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="15" fill="#4a1515">DeepEP HT Dispatch 通信路径 (GPU 0 视角)</text>
<g font-family="sans-serif" font-size="11">
