<svg font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif" viewbox="0 0 1100 460" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="dual_ar" markerheight="6" markerwidth="6" orient="auto" refx="9" refy="5" viewbox="0 0 10 10"><path d="M0,0 L10,5 L0,10 z" fill="#4b5563"></path></marker></defs>
<rect fill="#fff" height="460" width="1100"></rect>
<text fill="#111827" font-size="16" font-weight="700" text-anchor="middle" x="550" y="26">MegaMoE 在 Prefill / Decode / MTP 中的统一调用栈</text>
<text fill="#6b7280" font-size="11" text-anchor="middle" x="550" y="44">同一个 fused mega-kernel 服务所有阶段；只有 T (token 数) 不同</text>
<!-- Three batch sources -->
<g transform="translate(40,72)">
<rect fill="#fff5f0" height="78" rx="8" stroke="#b85450" stroke-width="1.3" width="320" x="0" y="0"></rect>
<text fill="#7a2f2b" font-size="12.5" font-weight="700" text-anchor="middle" x="160" y="22">Prefill chunk</text>
<text fill="#7a2f2b" font-size="10.5" text-anchor="middle" x="160" y="42">T = num_prefill_tokens</text>
<text fill="#7a2f2b" font-size="10.5" text-anchor="middle" x="160" y="58">几百 ~ 几万 tokens</text>
<text fill="#555" font-size="10.5" font-style="italic" text-anchor="middle" x="160" y="72">arithmetic intensity high</text>
</g>
<g transform="translate(390,72)">
<rect fill="#eef3ff" height="78" rx="8" stroke="#4a6fd3" stroke-width="1.3" width="320" x="0" y="0"></rect>
<text fill="#1a2d55" font-size="12.5" font-weight="700" text-anchor="middle" x="160" y="22">Decode (continuous batching)</text>
<text fill="#1a2d55" font-size="10.5" text-anchor="middle" x="160" y="42">T = num_decode_tokens</text>
<text fill="#1a2d55" font-size="10.5" text-anchor="middle" x="160" y="58">8 ~ 256 tokens</text>
<text fill="#555" font-size="10.5" font-style="italic" text-anchor="middle" x="160" y="72">low-medium intensity</text>
</g>
<g transform="translate(740,72)">
<rect fill="#f9eef8" height="78" rx="8" stroke="#a33ea1" stroke-width="1.3" width="320" x="0" y="0"></rect>
<text fill="#4a1a48" font-size="12.5" font-weight="700" text-anchor="middle" x="160" y="22">MTP / Spec decode / RL rollout</text>
<text fill="#4a1a48" font-size="10.5" text-anchor="middle" x="160" y="42">T = 2 · num_decodes  /  long-tail 1 ~ 16</text>
<text fill="#4a1a48" font-size="10.5" text-anchor="middle" x="160" y="58">draft + verify · small batch</text>
<text fill="#555" font-size="10.5" font-style="italic" text-anchor="middle" x="160" y="72">wave overlap shines (1.96×)</text>
</g>
<!-- Funnel arrows -->
<line marker-end="url(#dual_ar)" stroke="#4b5563" stroke-width="1.6" x1="200" x2="430" y1="156" y2="218"></line>
<line marker-end="url(#dual_ar)" stroke="#4b5563" stroke-width="1.6" x1="550" x2="550" y1="156" y2="218"></line>
<line marker-end="url(#dual_ar)" stroke="#4b5563" stroke-width="1.6" x1="900" x2="670" y1="156" y2="218"></line>
<!-- Single shared call stack -->
<rect fill="#f9fafb" height="72" rx="10" stroke="#9ca3af" stroke-dasharray="5 4" stroke-width="1.3" width="740" x="180" y="220"></rect>
<text fill="#111827" font-size="12.5" font-weight="700" text-anchor="middle" x="550" y="244">DeepseekV4MoE.forward(x : [T, hidden=7168])</text>
<text fill="#6b7280" font-size="10.5" text-anchor="middle" x="550" y="263">→ SharedFusedMoE → gate (FP32 top-6) → Mxfp4MoEMethod.apply(...)</text>
<text fill="#6b7280" font-size="10.5" text-anchor="middle" x="550" y="280">→ <tspan fill="#1a3d1a" font-weight="700">MegaMoE mega-kernel</tspan>  (DeepGEMM PR #304)  + shared expert  + TP all-reduce</text>
<!-- Inside MegaMoE: 5 stages -->
<g transform="translate(40,316)">
<text fill="#111827" font-size="12" font-weight="700" x="0" y="0">Inside the mega-kernel · wave-pipelined 5 stages (T-agnostic structure)</text>
</g>
<g transform="translate(40,330)">
<rect fill="#eef3ff" height="52" rx="8" stroke="#4a6fd3" width="180" x="0" y="0"></rect>
<text fill="#1a2d55" font-size="11" font-weight="700" text-anchor="middle" x="90" y="20">① Dispatch</text>
<text fill="#1a2d55" font-size="10" text-anchor="middle" x="90" y="38">FP8 all-to-all · pull</text>
<rect fill="#fff5f0" height="52" rx="8" stroke="#b85450" width="180" x="200" y="0"></rect>
<text fill="#7a2f2b" font-size="11" font-weight="700" text-anchor="middle" x="290" y="20">② Linear-1 (gate+up)</text>
<text fill="#7a2f2b" font-size="10" text-anchor="middle" x="290" y="38">FP4 × FP8 GEMM</text>
<rect fill="#fff4e0" height="52" rx="8" stroke="#e0b300" width="180" x="400" y="0"></rect>
<text fill="#7a4e00" font-size="11" font-weight="700" text-anchor="middle" x="490" y="20">③ SwiGLU + clamp</text>
<text fill="#7a4e00" font-size="10" text-anchor="middle" x="490" y="38">SFU + element-wise</text>
<rect fill="#fff5f0" height="52" rx="8" stroke="#b85450" width="180" x="600" y="0"></rect>
<text fill="#7a2f2b" font-size="11" font-weight="700" text-anchor="middle" x="690" y="20">④ Linear-2 (down)</text>
<text fill="#7a2f2b" font-size="10" text-anchor="middle" x="690" y="38">FP4 × FP8 GEMM</text>
<rect fill="#eef3ff" height="52" rx="8" stroke="#4a6fd3" width="180" x="800" y="0"></rect>
<text fill="#1a2d55" font-size="11" font-weight="700" text-anchor="middle" x="890" y="20">⑤ Combine</text>
<text fill="#1a2d55" font-size="10" text-anchor="middle" x="890" y="38">BF16 all-to-all</text>
</g>
<text fill="#5fa55f" font-size="11" font-style="italic" text-anchor="middle" x="550" y="408">wave 维度切分在 expert 上，T 大小不影响调度结构；只影响每 expert 的 GEMM batched 维度</text>
<text fill="#a33ea1" font-size="11" font-style="italic" text-anchor="middle" x="550" y="428">→ 唯一一处 prefill / decode 完全共享的内核（attention 必须分两条 kernel）</text>
<text fill="#6b7280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" text-anchor="middle" x="550" y="448">vllm/model_executor/models/deepseek_v4.py:103-231 · DeepseekV4MoE</text>
</svg>